<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>참여자 가이드 | Pokémon GO Global 🌏 가이드북</title>

  <style>
    body{
      margin:0;
      font-family:'Pretendard', sans-serif;
      background:#f5f6f8;
      color:#222;
    }

    .wrap{
      max-width:520px;
      margin:0 auto;
      padding:28px 20px 60px;
    }

    .top-link{
      display:inline-block;
      margin-bottom:18px;
      color:#666;
      font-size:14px;
      text-decoration:none;
    }

    .title{
      font-size:28px;
      font-weight:900;
      margin-bottom:10px;
    }

    .desc{
      color:#666;
      font-size:15px;
      line-height:1.6;
      margin-bottom:28px;
    }

    .card{
      display:block;
      padding:20px;
      margin-bottom:14px;
      border-radius:18px;
      background:#fff;
      text-decoration:none;
      color:#000;
      box-shadow:0 10px 25px rgba(0,0,0,0.05);
      transition:0.2s;
    }

    .card:hover{
      transform:translateY(-3px);
    }

    .card h2{
      margin:0;
      font-size:20px;
      font-weight:800;
    }

    .card p{
      margin:8px 0 0;
      color:#666;
      font-size:14px;
      line-height:1.5;
    }

    .bottom{
      margin-top:28px;
    }

    .main-btn{
      display:block;
      text-align:center;
      padding:16px;
      border-radius:14px;
      background:#4a7aff;
      color:#fff;
      text-decoration:none;
      font-weight:700;
    }

    @media(min-width:900px){
      .wrap{
        max-width:600px;
      }
    }
  </style>
</head>
<body>

  <div class="wrap">

    <a href="index.html" class="top-link">← 메인으로 돌아가기</a>

    <div class="title">참여자 가이드</div>
    <div class="desc">
      레이드에 참여하는 분들을 위한 가이드입니다.  
      참여 양식 작성, 초대 수락, 친구코드 추가 순서로 확인해주세요.
    </div>

    <a href="participant-join.html" class="card">
      <h2>레이드 참여하기</h2>
      <p>
        참여 양식 복사, @멘션 선택,
        친구 추가가 필요한 경우의 흐름까지 안내합니다.
      </p>
    </a>

    <a href="participant-accept.html" class="card">
      <h2>레이드 초대 수락 방법</h2>
      <p>
        멘션콜/초대 알림 확인 후 입장하는 방법과
        리모트 패스, 일일 한도 체크를 안내합니다.
      </p>
    </a>

    <a href="participant-friendcode.html" class="card">
      <h2>친구코드로 친구 추가하기</h2>
      <p>
        모집글 전체 복사 후
        친구코드를 빠르게 입력하는 방법입니다.
      </p>
    </a>

    <div class="bottom">
      <a href="index.html" class="main-btn">메인으로 돌아가기</a>
    </div>

  </div>

</body>
</html>
