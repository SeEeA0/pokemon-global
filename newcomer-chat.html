<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>채팅 규칙 | Pokémon GO Global 🌏</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0}

:root{
  --bg1:#fafbfc;
  --bg2:#f3f5f8;
  --bg3:#edf1f6;

  --text1:#1d1d1f;
  --text2:#70757f;
  --muted:#8f94a0;

  --cta1:#7d71ff;
  --cta2:#5a4de0;
  --cta3:#283c94;

  --shadow-card:0 24px 44px rgba(26,31,53,.12);
  --shadow-cta:0 18px 32px rgba(80,78,177,.28);

  --ease:cubic-bezier(.22,.61,.36,1);
}

body{
  font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo',sans-serif;
  background:
    radial-gradient(circle at top, var(--bg1) 0%, var(--bg2) 38%, var(--bg3) 100%);
  color:var(--text1);
  text-align:center;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

.page{
  min-height:100vh;
  display:flex;
  justify-content:center;
  padding:28px 16px 46px;
}

.wrap{
  width:100%;
  max-width:1160px;
  margin:0 auto;
}

.header-logo{
  margin:0 0 22px;
  font-size:14px;
  font-weight:700;
  color:var(--muted);
  letter-spacing:.08em;
  line-height:1.6;
}

.top-copy{
  max-width:960px;
  margin:0 auto 28px;
  transition:opacity .32s ease, transform .32s ease;
}
.top-copy.is-changing{
  opacity:.45;
  transform:translateY(4px);
}

.top-title{
  margin:0 0 12px;
  font-size:clamp(24px, 3vw, 34px);
  line-height:1.28;
  font-weight:800;
  letter-spacing:-0.03em;
  color:var(--text1);
  word-break:keep-all;
}

.top-sub{
  margin:0 auto;
  max-width:900px;
  font-size:clamp(16px, 2vw, 19px);
  line-height:1.82;
  color:var(--text2);
  word-break:keep-all;
}

.viewer-row{
  display:grid;
  grid-template-columns:86px minmax(0,1fr) 86px;
  align-items:center;
  gap:16px;
  max-width:1120px;
  margin:0 auto;
}

.side-nav{
  width:68px;
  height:68px;
  border:none;
  border-radius:999px;
  background:rgba(255,255,255,.78);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  box-shadow:
    0 14px 30px rgba(20,24,42,.10),
    inset 0 1px 0 rgba(255,255,255,.96);
  cursor:pointer;
  position:relative;
  transition:
    transform .18s ease,
    box-shadow .24s ease,
    background .24s ease,
    opacity .2s ease;
  display:flex;
  align-items:center;
  justify-content:center;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.side-nav:hover{
  background:rgba(255,255,255,.92);
  box-shadow:
    0 18px 34px rgba(20,24,42,.14),
    inset 0 1px 0 rgba(255,255,255,.98);
}
.side-nav:active,
.side-nav.is-pressed{
  transform:scale(.94);
  box-shadow:
    0 6px 14px rgba(20,24,42,.10),
    inset 0 2px 8px rgba(20,24,42,.08);
}
.side-nav.hidden{
  visibility:hidden;
  pointer-events:none;
  opacity:0;
}
.side-nav span{
  display:block;
  width:16px;
  height:16px;
  border-top:3px solid rgba(38,43,58,.62);
  border-right:3px solid rgba(38,43,58,.62);
}
.side-nav.prev span{
  transform:rotate(-135deg);
  margin-left:6px;
}
.side-nav.next span{
  transform:rotate(45deg);
  margin-right:6px;
}

.device-stage{
  display:flex;
  justify-content:center;
  align-items:center;
}

.device-card{
  position:relative;
  width:min(100%, 720px);
  margin:0 auto;
  border-radius:42px;
  padding:20px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.72) 0%, rgba(255,255,255,.52) 100%);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  box-shadow:
    var(--shadow-card),
    inset 0 1px 0 rgba(255,255,255,.96);
  border:1px solid rgba(255,255,255,.75);
}
.device-card::before{
  content:"";
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  width:108px;
  height:8px;
  border-radius:999px;
  background:rgba(30,34,46,.08);
  box-shadow:inset 0 1px 1px rgba(30,34,46,.08);
  opacity:.7;
}

.screen{
  position:relative;
  overflow:hidden;
  border-radius:34px;
  background:
    linear-gradient(180deg, #e9eef5 0%, #e0e7ef 100%);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.8),
    inset 0 0 0 1px rgba(25,28,43,.05);
}

.slider{
  width:100%;
  overflow:hidden;
}

.track{
  display:flex;
  width:100%;
  transition:transform .56s var(--ease);
  will-change:transform;
}

.slide{
  min-width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}

.slide img{
  width:100%;
  display:block;
  object-fit:contain;
  border-radius:28px;
  background:#000;
  box-shadow:
    0 0 0 1px rgba(20,24,42,.06),
    0 12px 24px rgba(20,24,42,.08);
}

.pager{
  margin:16px 0 0;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  user-select:none;
}

.pager-dot{
  width:10px;
  height:10px;
  border-radius:999px;
  background:#cbd1db;
  transition:all .28s ease;
}
.pager-dot.active{
  width:24px;
  background:#1f2128;
  box-shadow:0 4px 12px rgba(31,33,40,.14);
}

.bottom{
  max-width:920px;
  margin:28px auto 0;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.row a,
.main{
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
  transition:
    transform .18s ease,
    box-shadow .24s ease,
    opacity .2s ease;
}

.row a::before,
.main::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(115deg, transparent 0%, rgba(255,255,255,.30) 46%, transparent 70%);
  transform:translateX(-120%);
  transition:transform .72s ease;
  pointer-events:none;
}
.row a:hover::before,
.main:hover::before{
  transform:translateX(120%);
}

.row a:active,
.row a.is-pressed,
.main:active,
.main.is-pressed{
  transform:scale(.985);
}

.row a{
  min-height:68px;
  padding:16px 18px;
  border-radius:20px;
  background:rgba(255,255,255,.78);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  color:#1d1f26;
  font-weight:700;
  font-size:18px;
  line-height:1.35;
  box-shadow:
    0 12px 28px rgba(28,34,56,.06),
    inset 0 1px 0 rgba(255,255,255,.98);
  word-break:keep-all;
}

.main{
  margin-top:14px;
  width:100%;
  min-height:72px;
  padding:18px 22px;
  border-radius:22px;
  background:linear-gradient(135deg, var(--cta1) 0%, var(--cta2) 46%, var(--cta3) 100%);
  color:#fff;
  font-weight:800;
  font-size:20px;
  letter-spacing:-0.02em;
  box-shadow:
    var(--shadow-cta),
    inset 0 1px 0 rgba(255,255,255,.18);
}

.ripple{
  position:absolute;
  border-radius:999px;
  transform:translate(-50%, -50%);
  background:rgba(255,255,255,.24);
  pointer-events:none;
  animation:rippleAnim .55s ease-out forwards;
}
@keyframes rippleAnim{
  0%{width:0;height:0;opacity:.55}
  100%{width:220px;height:220px;opacity:0}
}

@media (min-width:1024px){
  .device-card{
    width:720px;
  }
}

@media (max-width:900px){
  .viewer-row{
    grid-template-columns:58px minmax(0,1fr) 58px;
    gap:10px;
  }
  .side-nav{
    width:50px;
    height:50px;
  }
  .top-copy{
    max-width:96%;
  }
  .top-title{
    font-size:clamp(22px, 5vw, 30px);
  }
  .top-sub{
    max-width:94%;
    font-size:16px;
  }
  .device-card{
    width:min(100%, 920px);
    border-radius:34px;
    padding:16px;
  }
  .screen{
    border-radius:28px;
  }
  .slide img{
    border-radius:22px;
  }
  .row a{
    font-size:16px;
    min-height:62px;
  }
  .main{
    min-height:66px;
    font-size:18px;
  }
}

@media (max-width:640px){
  .page{
    padding:20px 12px 34px;
  }
  .header-logo{
    margin-bottom:16px;
    font-size:13px;
  }
  .top-copy{
    margin-bottom:20px;
  }
  .viewer-row{
    grid-template-columns:44px minmax(0,1fr) 44px;
    gap:8px;
  }
  .side-nav{
    width:42px;
    height:42px;
  }
  .side-nav span{
    width:12px;
    height:12px;
    border-top-width:2.5px;
    border-right-width:2.5px;
  }
  .device-card{
    width:min(100%, 1000px);
    border-radius:26px;
    padding:12px;
  }
  .device-card::before{
    width:82px;
    height:6px;
    top:8px;
  }
  .screen{
    border-radius:20px;
  }
  .slide img{
    border-radius:18px;
  }
  .pager{
    gap:8px;
    margin-top:12px;
  }
  .pager-dot{
    width:9px;
    height:9px;
  }
  .pager-dot.active{
    width:22px;
  }
  .row{
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  .row a{
    min-height:56px;
    padding:12px 10px;
    font-size:14px;
    border-radius:16px;
  }
  .main{
    margin-top:12px;
    min-height:60px;
    padding:16px 14px;
    font-size:17px;
    border-radius:18px;
  }
}

</style>
</head>
<body>
<div class="page">
  <div class="wrap">
    <div class="header-logo">PGO Global🌏오픈톡 가이드</div>

    <div class="top-copy" id="topCopy">
      <h2 class="top-title" id="titleText">1. 채팅 규칙 확인</h2>
      <p class="top-sub" id="descText">
        채팅방에서는 짧고 거친 말투 대신<br>
        보기 쉬운 정중한 표현을 사용해 주세요.
      </p>
    </div>

    <div class="viewer-row">
      <button class="side-nav prev" id="prevBtn" type="button" aria-label="이전 이미지">
        <span></span>
      </button>

      <div class="device-stage">
        <div class="device-card">
          <div class="screen">
            <div class="slider" id="slider">
              <div class="track" id="track">
                <div class="slide"><img src="images/newcomer-chat-01.jpg" alt="1. 채팅 규칙 확인"></div>
                <div class="slide"><img src="images/newcomer-chat-02.jpg" alt="2. 반말/혼잣말 금지"></div>
                <div class="slide"><img src="images/newcomer-chat-03.jpg" alt="3. 단타 금지"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <button class="side-nav next" id="nextBtn" type="button" aria-label="다음 이미지">
        <span></span>
      </button>
    </div>

    <div class="pager" id="pager"></div>

    <div class="bottom">
      <div class="row">
        <a href="newcomer-nickname.html" class="pressable">이전 가이드 : 톡방 닉네임 변경</a>
        <a href="newcomer.html" class="pressable">신입 이용수칙</a>
      </div>
      <a href="index.html" class="main pressable">메인으로 돌아가기</a>
    </div>
  </div>
</div>

<script>
let index = 0;
const track = document.getElementById("track");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
const pager = document.getElementById("pager");
const topCopy = document.getElementById("topCopy");
const titleEl = document.getElementById("titleText");
const descEl = document.getElementById("descText");

const titles = [
  "1. 채팅 규칙 확인",
  "2. 반말/혼잣말 금지",
  "3. 단타 금지"
];

const texts = [
  "채팅방에서는 짧고 거친 말투 대신<br>보기 쉬운 정중한 표현을 사용해 주세요.",
  "혼잣말, 반말, 줄임말은 오해를 만들 수 있어<br>문장형으로 정리해서 작성해 주세요.",
  "단어를 끊어서 여러 번 보내기보다<br>한 번에 정리해서 보내는 것이 좋습니다."
];

const total = titles.length;

function renderPager(){
  pager.innerHTML = "";
  for(let i = 0; i < total; i++){
    const dot = document.createElement("span");
    dot.className = "pager-dot" + (i === index ? " active" : "");
    pager.appendChild(dot);
  }
}

function updateText(){
  topCopy.classList.add("is-changing");
  setTimeout(() => {
    titleEl.innerText = titles[index];
    descEl.innerHTML = texts[index];
    topCopy.classList.remove("is-changing");
  }, 130);
}

function update(){
  track.style.transform = `translateX(-${index * 100}%)`;
  updateText();
  prevBtn.classList.toggle("hidden", index === 0);
  nextBtn.classList.toggle("hidden", index === total - 1);
  renderPager();
}

function next(){
  if(index >= total - 1) return;
  index++;
  update();
}

function prev(){
  if(index <= 0) return;
  index--;
  update();
}

prevBtn.addEventListener("click", prev);
nextBtn.addEventListener("click", next);

let startX = 0;
let isDown = false;
const slider = document.getElementById("slider");

slider.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
}, { passive:true });

slider.addEventListener("touchend", e => {
  const endX = e.changedTouches[0].clientX;
  if(startX - endX > 50 && index < total - 1) next();
  else if(endX - startX > 50 && index > 0) prev();
}, { passive:true });

slider.addEventListener("mousedown", e => {
  isDown = true;
  startX = e.clientX;
});

document.addEventListener("mouseup", e => {
  if(!isDown) return;
  isDown = false;
  const endX = e.clientX;
  if(startX - endX > 50 && index < total - 1) next();
  else if(endX - startX > 50 && index > 0) prev();
});

function addRipple(el, e){
  const rect = el.getBoundingClientRect();
  const ripple = document.createElement("span");
  ripple.className = "ripple";
  const x = e ? (e.clientX - rect.left) : rect.width / 2;
  const y = e ? (e.clientY - rect.top) : rect.height / 2;
  ripple.style.left = x + "px";
  ripple.style.top = y + "px";
  el.appendChild(ripple);
  setTimeout(() => ripple.remove(), 550);
}

document.querySelectorAll(".pressable, .side-nav").forEach(el => {
  el.addEventListener("pointerdown", (e) => {
    el.classList.add("is-pressed");
    addRipple(el, e);
  });
  el.addEventListener("pointerup", () => {
    setTimeout(() => el.classList.remove("is-pressed"), 90);
  });
  el.addEventListener("pointerleave", () => {
    el.classList.remove("is-pressed");
  });
});

update();
</script>
</body>
</html>
