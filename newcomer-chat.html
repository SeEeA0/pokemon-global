<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>채팅 가이드 | Pokémon GO Global</title>

<style>
body{
  margin:0;
  font-family: 'Pretendard', sans-serif;
  background:#f5f6f8;
  color:#222;
  text-align:center;
}

/* 타이틀 */
.title{
  font-size:32px;
  font-weight:900;
  margin:60px 0 30px;
}

/* 슬라이드 영역 */
.slider{
  max-width:420px;
  margin:0 auto;
  position:relative;
}

.slide{
  display:none;
}

.slide.active{
  display:block;
}

.slide img{
  width:100%;
  border-radius:30px;
  box-shadow:0 20px 40px rgba(0,0,0,0.1);
}

/* 좌우 버튼 */
.nav{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:100%;
  display:flex;
  justify-content:space-between;
}

.nav button{
  background:#fff;
  border:none;
  width:48px;
  height:48px;
  border-radius:50%;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  cursor:pointer;
  font-size:20px;
}

/* dots */
.dots{
  margin:20px 0;
}

.dots span{
  display:inline-block;
  width:10px;
  height:10px;
  margin:0 4px;
  background:#ddd;
  border-radius:50%;
}

.dots .active{
  background:#333;
}

/* 설명 */
.desc{
  margin-top:20px;
}

.desc h2{
  font-size:22px;
  margin-bottom:10px;
}

.desc p{
  color:#666;
  line-height:1.6;
}

/* 하단 네비 */
.bottom{
  margin:50px 20px;
}

.bottom a{
  display:block;
  padding:16px;
  margin-bottom:10px;
  border-radius:14px;
  background:#fff;
  text-decoration:none;
  color:#000;
  font-weight:600;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

/* 메인 버튼 */
.main-btn{
  background:#4a7aff;
  color:#fff !important;
}
</style>
</head>

<body>

<div class="title">
포고 글로벌방에서 이건 지켜주세요!
</div>

<div class="slider">

  <!-- slide 1 -->
  <div class="slide active">
    <img src="images/newcomer-chat-01.jpg">
  </div>

  <!-- slide 2 -->
  <div class="slide">
    <img src="images/newcomer-chat-02.jpg">
  </div>

  <!-- slide 3 -->
  <div class="slide">
    <img src="images/newcomer-chat-03.jpg">
  </div>

  <!-- nav -->
  <div class="nav">
    <button onclick="prev()">‹</button>
    <button onclick="next()">›</button>
  </div>

</div>

<!-- dots -->
<div class="dots">
  <span class="active"></span>
  <span></span>
  <span></span>
</div>

<!-- 설명 -->
<div class="desc">
  <h2 id="title">1. 음슴체 사용 금지</h2>
  <p id="text">
    문장을 끝맺을 때 주어·서술어를 생략하고 "~함 / ~됨 / ~임" 같은 표현을 사용하지 말아주세요
  </p>
</div>

<!-- 하단 -->
<div class="bottom">
  <a href="newcomer-nickname.html">이전 가이드</a>
  <a href="host-recruit.html">다음 가이드</a>
  <a href="index.html" class="main-btn">메인으로 돌아가기</a>
</div>

<script>
let index = 0;

const slides = document.querySelectorAll(".slide");
const dots = document.querySelectorAll(".dots span");

const titles = [
"1. 음슴체 사용 금지",
"2. 반말 금지",
"3. 단타 금지"
];

const texts = [
"문장을 끝맺을 때 '~함 / ~됨 / ~임' 같은 표현을 사용하지 말아주세요",
"~한데 / ~갈사람? 같은 반말 표현을 사용하지 말아주세요",
"한 문장을 여러 개로 나눠 보내는 단타 채팅을 하지 말아주세요"
];

function update(){
  slides.forEach(s=>s.classList.remove("active"));
  dots.forEach(d=>d.classList.remove("active"));

  slides[index].classList.add("active");
  dots[index].classList.add("active");

  document.getElementById("title").innerText = titles[index];
  document.getElementById("text").innerText = texts[index];
}

function next(){
  index = (index+1)%slides.length;
  update();
}

function prev(){
  index = (index-1+slides.length)%slides.length;
  update();
}
</script>

</body>
</html>
