<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>닉네임 설정 | Pokémon GO Global</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo',sans-serif;
  background:#f3f4f6;
  color:#222;
  text-align:center;
}

.page{
  min-height:100vh;
  display:flex;
  justify-content:center;
  padding:24px 16px 44px;
}

.wrap{
  width:100%;
  max-width:1120px;
  margin:0 auto;
}

/* 상단 로고 */
.header-logo{
  margin:0 0 22px;
  font-size:14px;
  font-weight:600;
  color:#8b8b8b;
  letter-spacing:.06em;
  line-height:1.6;
}

/* 상단 설명 */
.top-copy{
  max-width:940px;
  margin:0 auto 24px;
}

.top-title{
  margin:0 0 12px;
  font-size:24px;
  line-height:1.35;
  font-weight:800;
  letter-spacing:-0.02em;
  color:#222;
  word-break:keep-all;
}

.top-sub{
  margin:0 auto;
  max-width:900px;
  font-size:17px;
  line-height:1.8;
  color:#666;
  word-break:keep-all;
}

/* 뷰어 */
.viewer-row{
  display:grid;
  grid-template-columns:72px minmax(0,1fr) 72px;
  align-items:center;
  gap:16px;
  max-width:1080px;
  margin:0 auto;
}

.side-nav{
  width:64px;
  height:64px;
  border:none;
  border-radius:999px;
  background:rgba(255,255,255,.96);
  box-shadow:0 10px 24px rgba(0,0,0,.10);
  cursor:pointer;
  position:relative;
  transition:.22s ease;
  display:flex;
  align-items:center;
  justify-content:center;
}
.side-nav:hover{
  transform:translateY(-1px);
  background:#fff;
  box-shadow:0 14px 30px rgba(0,0,0,.14);
}
.side-nav.hidden{
  visibility:hidden;
  pointer-events:none;
}
.side-nav span{
  display:block;
  width:16px;
  height:16px;
  border-top:3px solid rgba(0,0,0,.58);
  border-right:3px solid rgba(0,0,0,.58);
}
.side-nav.prev span{
  transform:rotate(-135deg);
  margin-left:6px;
}
.side-nav.next span{
  transform:rotate(45deg);
  margin-right:6px;
}

.phone-stage{
  display:flex;
  justify-content:center;
  align-items:center;
}

/* 실제 업로드한 폰 프레임 기준 */
.phone{
  position:relative;
  width:min(100%, 760px);
  aspect-ratio:1024 / 1280;
  margin:0 auto;
  background:url('phone-frame.png') center center / contain no-repeat;
}

/*
  phone-frame.png 기준 삽입 영역
  필요하면 여기 값만 1~2% 미세조정하면 됩니다.
*/
.screen{
  position:absolute;
  top:8.6%;
  left:23.6%;
  width:52.7%;
  height:68.6%;
  overflow:hidden;
  border-radius:36px;
  background:#dbe6f1;
}

/* 1080x1728 비율 유지 */
.slider{
  width:100%;
  height:100%;
  overflow:hidden;
}

.track{
  display:flex;
  width:100%;
  height:100%;
  transition:transform .35s ease;
}

.slide{
  min-width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#dbe6f1;
}

.slide img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
  background:#dbe6f1;
}

/* 인디케이터 */
.pager{
  margin:12px 0 0;
  font-size:16px;
  line-height:1;
  letter-spacing:.18em;
  color:#b8bcc2;
  user-select:none;
}
.pager .active{
  color:#222;
}

/* 하단 버튼 */
.bottom{
  max-width:860px;
  margin:26px auto 0;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.row a{
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:64px;
  padding:14px 16px;
  border-radius:18px;
  background:#fff;
  text-decoration:none;
  color:#000;
  font-weight:700;
  font-size:18px;
  box-shadow:0 8px 20px rgba(0,0,0,.05);
  line-height:1.4;
  transition:.22s ease;
  word-break:keep-all;
}
.row a:hover{
  transform:translateY(-1px);
  box-shadow:0 12px 24px rgba(0,0,0,.08);
}

.main{
  margin-top:14px;
  display:block;
  width:100%;
  padding:18px 20px;
  border-radius:18px;
  background:#4a7aff;
  color:#fff;
  text-decoration:none;
  font-weight:800;
  font-size:19px;
  box-shadow:0 12px 28px rgba(74,122,255,.25);
  transition:.22s ease;
}
.main:hover{
  transform:translateY(-1px);
  box-shadow:0 16px 30px rgba(74,122,255,.30);
}

/* 태블릿 */
@media (max-width:900px){
  .wrap{
    max-width:100%;
  }
  .top-copy{
    max-width:860px;
  }
  .top-title{
    font-size:22px;
  }
  .top-sub{
    font-size:16px;
  }
  .viewer-row{
    grid-template-columns:56px minmax(0,1fr) 56px;
    gap:10px;
  }
  .side-nav{
    width:50px;
    height:50px;
  }
  .phone{
    width:min(100%, 700px);
  }
  .screen{
    border-radius:28px;
  }
  .row a{
    font-size:16px;
    min-height:58px;
  }
  .main{
    font-size:18px;
  }
}

/* 모바일 */
@media (max-width:640px){
  .page{
    padding:20px 12px 32px;
  }
  .header-logo{
    margin-bottom:16px;
    font-size:13px;
  }
  .top-copy{
    margin-bottom:18px;
  }
  .top-title{
    font-size:20px;
    margin-bottom:10px;
  }
  .top-sub{
    font-size:15px;
    line-height:1.75;
    max-width:95%;
  }
  .viewer-row{
    grid-template-columns:42px minmax(0,1fr) 42px;
    gap:8px;
  }
  .side-nav{
    width:40px;
    height:40px;
  }
  .side-nav span{
    width:12px;
    height:12px;
    border-top-width:2.5px;
    border-right-width:2.5px;
  }
  .phone{
    width:min(100%, 640px);
  }
  .screen{
    top:8.6%;
    left:23.6%;
    width:52.7%;
    height:68.6%;
    border-radius:18px;
  }
  .pager{
    margin-top:10px;
    font-size:14px;
    letter-spacing:.15em;
  }
  .bottom{
    margin-top:22px;
  }
  .row{
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  .row a{
    min-height:54px;
    padding:12px 10px;
    font-size:14px;
    border-radius:16px;
  }
  .main{
    margin-top:12px;
    padding:16px 16px;
    font-size:17px;
    border-radius:16px;
  }
}
</style>
</head>
<body>
<div class="page">
  <div class="wrap">
    <div class="header-logo">Pokémon GO Global 🌏</div>

    <div class="top-copy">
      <h2 class="top-title" id="titleText">1. 햄버거 버튼을 클릭</h2>
      <p class="top-sub" id="descText">오픈채팅방 상단 프로필을 누른 뒤, 본인 프로필을 선택하고 닉네임 수정 화면으로 이동해 주세요.</p>
    </div>

    <div class="viewer-row">
      <button class="side-nav prev" id="prevBtn" type="button" onclick="prev()" aria-label="이전 이미지">
        <span></span>
      </button>

      <div class="phone-stage">
        <div class="phone">
          <div class="screen">
            <div class="slider" id="slider">
              <div class="track" id="track">
                <div class="slide"><img src="images/newcomer-nickname-01.jpg" alt="1. 햄버거 버튼을 클릭"></div>
                <div class="slide"><img src="images/newcomer-nickname-02.jpg" alt="2. 프로필 수정"></div>
                <div class="slide"><img src="images/newcomer-nickname-03.jpg" alt="3. 글로벌 양식에 맞춰 닉네임 설정"></div>
                <div class="slide"><img src="images/newcomer-nickname-04.jpg" alt="4. 개인정보 일부 가리기"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <button class="side-nav next" id="nextBtn" type="button" onclick="next()" aria-label="다음 이미지">
        <span></span>
      </button>
    </div>

    <div class="pager" id="pager">● ○ ○ ○</div>

    <div class="bottom">
      <div class="row">
        <a href="newcomer.html">이전 가이드 : 신입 가이드 목록</a>
        <a href="newcomer-chat.html">다음 가이드 : 채팅 규칙</a>
      </div>
      <a href="index.html" class="main">메인으로 돌아가기</a>
    </div>
  </div>
</div>

<script>
let index = 0;
const track = document.getElementById("track");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
const pager = document.getElementById("pager");

const titles = [
  "1. 햄버거 버튼을 클릭",
  "2. 프로필 수정",
  "3. 글로벌 양식에 맞춰 닉네임 설정",
  "4. 개인정보 일부 가리기"
];

const texts = [
  "오픈채팅방 상단 프로필을 누른 뒤, 본인 프로필을 선택하고 닉네임 수정 화면으로 이동해 주세요.",
  "닉네임은 톡방 닉네임 / 포켓몬고 아이디 / 레벨 형식으로 입력해 주세요. 이 3가지 항목만 넣으면 됩니다.",
  "톡방 닉네임은 다른 분들이 부르기 쉽도록 반드시 한글로 작성하고, 중복되지 않게 설정해 주세요.",
  "포켓몬고 아이디가 길어서 기재가 안되거나 개인정보가 들어간 경우 뒷부분은 *** 처리해도 됩니다."
];

const total = titles.length;

function renderPager(){
  let html = "";
  for(let i = 0; i < total; i++){
    html += i === index ? '<span class="active">●</span>' : '<span>○</span>';
    if(i < total - 1) html += " ";
  }
  pager.innerHTML = html;
}

function update(){
  track.style.transform = `translateX(-${index * 100}%)`;
  document.getElementById("titleText").innerText = titles[index];
  document.getElementById("descText").innerText = texts[index];

  if(index === 0){
    prevBtn.classList.add("hidden");
  }else{
    prevBtn.classList.remove("hidden");
  }

  if(index === total - 1){
    nextBtn.classList.add("hidden");
  }else{
    nextBtn.classList.remove("hidden");
  }

  renderPager();
}

function next(){
  if(index >= total - 1) return;
  index++;
  update();
}

function prev(){
  if(index <= 0) return;
  index--;
  update();
}

/* 스와이프 */
let startX = 0;
let isDown = false;
const slider = document.getElementById("slider");

slider.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
}, { passive:true });

slider.addEventListener("touchend", e => {
  const endX = e.changedTouches[0].clientX;
  if(startX - endX > 50 && index < total - 1) next();
  else if(endX - startX > 50 && index > 0) prev();
}, { passive:true });

slider.addEventListener("mousedown", e => {
  isDown = true;
  startX = e.clientX;
});

document.addEventListener("mouseup", e => {
  if(!isDown) return;
  isDown = false;
  const endX = e.clientX;
  if(startX - endX > 50 && index < total - 1) next();
  else if(endX - startX > 50 && index > 0) prev();
});

update();
</script>
</body>
</html>
