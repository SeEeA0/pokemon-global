<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>닉네임 설정 | Pokémon GO Global</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo',sans-serif;
  background:#f3f4f6;
  color:#222;
  text-align:center;
}

.page{
  min-height:100vh;
  display:flex;
  justify-content:center;
  padding:36px 20px 44px;
}

.wrap{
  width:100%;
  max-width:980px;
  margin:0 auto;
}

.breadcrumb{
  display:inline-block;
  margin-bottom:18px;
  color:#666;
  font-size:14px;
  text-decoration:none;
}
.breadcrumb:hover{color:#222}

.kicker{
  display:inline-block;
  padding:8px 14px;
  border-radius:999px;
  background:#edf4ff;
  color:#3f6fff;
  font-size:12px;
  font-weight:700;
  margin-bottom:14px;
}

.title{
  font-size:30px;
  font-weight:900;
  margin-bottom:10px;
  line-height:1.2;
  letter-spacing:-0.03em;
}

.lead{
  font-size:15px;
  color:#666;
  line-height:1.7;
  margin:0 auto 28px;
  max-width:560px;
  word-break:keep-all;
}

/* 핸드폰 + 좌우버튼 */
.viewer-row{
  display:grid;
  grid-template-columns:72px minmax(0,1fr) 72px;
  align-items:center;
  gap:20px;
  max-width:900px;
  margin:0 auto;
}

.side-nav{
  width:64px;
  height:64px;
  border:none;
  border-radius:999px;
  background:rgba(255,255,255,.92);
  box-shadow:0 10px 24px rgba(0,0,0,.10);
  cursor:pointer;
  position:relative;
  transition:.22s ease;
  display:flex;
  align-items:center;
  justify-content:center;
}
.side-nav:hover{
  transform:translateY(-1px);
  background:#fff;
  box-shadow:0 14px 30px rgba(0,0,0,.14);
}
.side-nav span{
  display:block;
  width:16px;
  height:16px;
  border-top:3px solid rgba(0,0,0,.58);
  border-right:3px solid rgba(0,0,0,.58);
}
.side-nav.prev span{transform:rotate(-135deg);margin-left:6px}
.side-nav.next span{transform:rotate(45deg);margin-right:6px}

/* 핸드폰 프레임 */
.phone-stage{
  display:flex;
  justify-content:center;
  align-items:center;
}

.phone{
  position:relative;
  width:min(100%, 620px);
  aspect-ratio:780 / 1450;
  border-radius:58px;
  padding:22px;
  background:linear-gradient(180deg,#fdfdfd 0%,#f6f6f7 100%);
  box-shadow:
    0 26px 60px rgba(0,0,0,.12),
    inset 0 2px 0 rgba(255,255,255,.95),
    inset 0 -2px 0 rgba(0,0,0,.03);
}

.phone::before{
  content:"";
  position:absolute;
  inset:11px;
  border-radius:48px;
  border:1px solid rgba(0,0,0,.05);
  pointer-events:none;
}

.phone::after{
  content:"";
  position:absolute;
  top:18px;
  left:50%;
  transform:translateX(-50%);
  width:110px;
  height:10px;
  border-radius:999px;
  background:rgba(0,0,0,.08);
  box-shadow:inset 0 1px 2px rgba(0,0,0,.08);
  pointer-events:none;
}

/* 폰 내부는 이미지만 */
.phone-screen{
  position:relative;
  width:100%;
  height:100%;
  border-radius:40px;
  overflow:hidden;
  background:#d8e3ee;
  box-shadow:inset 0 0 0 1px rgba(0,0,0,.04);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px;
}

.slider{
  position:relative;
  width:100%;
  height:100%;
  overflow:hidden;
  border-radius:30px;
  background:#d3deea;
}

.track{
  display:flex;
  width:100%;
  height:100%;
  transition:transform .35s ease;
}

.slide{
  min-width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0;
}

/* 핵심: 이미지 안 잘리게 */
.slide img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
  background:#d3deea;
}

/* 폰 아래 설명 */
.info-area{
  max-width:760px;
  margin:26px auto 0;
}

.desc{
  background:#fff;
  border-radius:24px;
  box-shadow:0 10px 24px rgba(0,0,0,.06);
  padding:26px 22px;
}
.desc h2{
  font-size:22px;
  margin:0 0 12px;
  line-height:1.35;
  letter-spacing:-0.02em;
}
.desc p{
  color:#666;
  line-height:1.8;
  margin:0;
  word-break:keep-all;
}

/* 하단 버튼 */
.bottom{
  margin-top:18px;
}
.row{
  display:flex;
  gap:12px;
}
.row a{
  flex:1;
  padding:15px 14px;
  border-radius:16px;
  background:#fff;
  text-decoration:none;
  color:#000;
  font-weight:600;
  box-shadow:0 8px 20px rgba(0,0,0,.05);
  line-height:1.45;
  transition:.22s ease;
}
.row a:hover{
  transform:translateY(-1px);
  box-shadow:0 12px 24px rgba(0,0,0,.08);
}

.main{
  margin-top:12px;
  display:block;
  width:100%;
  padding:16px 20px;
  border-radius:16px;
  background:#4a7aff;
  color:#fff;
  text-decoration:none;
  font-weight:700;
  box-shadow:0 12px 28px rgba(74,122,255,.25);
  transition:.22s ease;
}
.main:hover{
  transform:translateY(-1px);
  box-shadow:0 16px 30px rgba(74,122,255,.30);
}

/* 모바일 */
@media (max-width:768px){
  .page{
    padding:22px 12px 30px;
  }
  .title{
    font-size:26px;
  }
  .lead{
    font-size:14px;
    margin-bottom:22px;
  }
  .viewer-row{
    grid-template-columns:44px minmax(0,1fr) 44px;
    gap:8px;
  }
  .side-nav{
    width:42px;
    height:42px;
  }
  .side-nav span{
    width:12px;
    height:12px;
    border-top-width:2.5px;
    border-right-width:2.5px;
  }
  .phone{
    border-radius:42px;
    padding:16px;
  }
  .phone::before{
    inset:8px;
    border-radius:34px;
  }
  .phone::after{
    top:12px;
    width:84px;
    height:8px;
  }
  .phone-screen{
    border-radius:28px;
    padding:12px;
  }
  .slider{
    border-radius:22px;
  }
  .info-area{
    margin-top:20px;
  }
  .desc{
    padding:20px 16px;
    border-radius:20px;
  }
  .desc h2{
    font-size:20px;
  }
  .row{
    flex-direction:row;
    gap:10px;
  }
  .row a{
    font-size:14px;
    padding:14px 10px;
  }
}

@media (max-width:520px){
  .wrap{
    max-width:100%;
  }
  .kicker{
    font-size:11px;
  }
  .title{
    font-size:23px;
  }
  .viewer-row{
    grid-template-columns:38px minmax(0,1fr) 38px;
    gap:6px;
  }
  .side-nav{
    width:38px;
    height:38px;
  }
  .desc p{
    font-size:15px;
  }
  .row{
    flex-direction:column;
  }
}
</style>
</head>
<body>
<div class="page">
  <div class="wrap">
    <a href="index.html" class="breadcrumb">← 메인으로 돌아가기</a>
    <div class="kicker">신입 가이드</div>
    <div class="title">닉네임 설정</div>
    <p class="lead">오픈채팅방에서 사용할 닉네임은 톡방 닉네임 / 포켓몬고 아이디 / 레벨 형식으로 설정해 주세요.</p>

    <div class="viewer-row">
      <button class="side-nav prev" type="button" onclick="prev()" aria-label="이전 이미지">
        <span></span>
      </button>

      <div class="phone-stage">
        <div class="phone">
          <div class="phone-screen">
            <div class="slider" id="slider">
              <div class="track" id="track">
                <div class="slide"><img src="images/newcomer-nickname-01.jpg" alt="1. 프로필 편집으로 이동"></div>
                <div class="slide"><img src="images/newcomer-nickname-02.jpg" alt="2. 닉네임 형식 입력"></div>
                <div class="slide"><img src="images/newcomer-nickname-03.jpg" alt="3. 한글 닉네임 설정"></div>
                <div class="slide"><img src="images/newcomer-nickname-04.jpg" alt="4. 개인정보 일부 가리기"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <button class="side-nav next" type="button" onclick="next()" aria-label="다음 이미지">
        <span></span>
      </button>
    </div>

    <div class="info-area">
      <div class="desc">
        <h2 id="titleText">1. 햄버거 버튼을 클릭</h2>
        <p id="descText">오픈채팅방 상단 프로필을 누른 뒤, 본인 프로필을 선택하고 닉네임 수정 화면으로 이동해 주세요.</p>
      </div>

      <div class="bottom">
        <div class="row">
          <a href="newcomer.html">이전 가이드 : 신입 가이드 목록</a>
          <a href="newcomer-chat.html">다음 가이드 : 채팅 규칙</a>
        </div>
        <a href="index.html" class="main">메인으로 돌아가기</a>
      </div>
    </div>
  </div>
</div>

<script>
let index = 0;
const track = document.getElementById("track");
const titles = [
  "1. 햄버거 버튼을 클릭",
  "2. 프로필 수정",
  "3. 글로벌 양식에 맞춰 닉네임 설정",
  "4. 개인정보 일부 가리기"
];
const texts = [
  "오픈채팅방 상단 프로필을 누른 뒤, 본인 프로필을 선택하고 닉네임 수정 화면으로 이동해 주세요.",
  "닉네임은 톡방 닉네임 / 포켓몬고 아이디 / 레벨 형식으로 입력해 주세요. 이 3가지 항목만 넣으면 됩니다.",
  "톡방 닉네임은 다른 분들이 부르기 쉽도록 반드시 한글로 작성하고, 중복되지 않게 설정해 주세요.",
  "포켓몬고 아이디가 길어서 기재가 안되거나 개인정보가 들어간 경우 뒷부분은 *** 처리해도 됩니다."
];
const total = titles.length;

function update(){
  track.style.transform = `translateX(-${index * 100}%)`;
  document.getElementById("titleText").innerText = titles[index];
  document.getElementById("descText").innerText = texts[index];
}

function next(){
  index = (index + 1) % total;
  update();
}

function prev(){
  index = (index - 1 + total) % total;
  update();
}

/* 스와이프 */
let startX = 0;
let isDown = false;
const slider = document.getElementById("slider");

slider.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
}, { passive:true });

slider.addEventListener("touchend", e => {
  const endX = e.changedTouches[0].clientX;
  if(startX - endX > 50) next();
  else if(endX - startX > 50) prev();
}, { passive:true });

slider.addEventListener("mousedown", e => {
  isDown = true;
  startX = e.clientX;
});

document.addEventListener("mouseup", e => {
  if(!isDown) return;
  isDown = false;
  const endX = e.clientX;
  if(startX - endX > 50) next();
  else if(endX - startX > 50) prev();
});

update();
</script>
</body>
</html>
