<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokémon GO Global 🌏 가이드북</title>

<style>
body{
  margin:0;
  font-family:'Pretendard', sans-serif;
  background:#f5f6f8;
  color:#222;
}

/* 전체 */
.wrap{
  max-width:520px;
  margin:0 auto;
}

/* 히어로 이미지 */
.hero img{
  width:100%;
  display:block;
}

/* 아코디언 */
.section{
  padding:20px;
}

.accordion{
  margin-top:10px;
}

.acc-item{
  margin-bottom:10px;
}

.acc-header{
  width:100%;
  padding:18px;
  border-radius:16px;
  background:#fff;
  border:none;
  text-align:left;
  font-size:16px;
  font-weight:700;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
  cursor:pointer;
}

.acc-body{
  display:none;
  padding:10px;
}

.acc-body a{
  display:block;
  padding:14px;
  border-radius:12px;
  background:#fafafa;
  margin-bottom:8px;
  text-decoration:none;
  color:#333;
  font-size:14px;
}

/* Q&A */
.qna{
  margin-top:40px;
}

.qna h2{
  font-size:20px;
  margin-bottom:10px;
}

.qna-item{
  background:#fff;
  padding:16px;
  border-radius:14px;
  margin-bottom:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.q{
  font-weight:700;
  margin-bottom:6px;
}

.a{
  color:#666;
  font-size:14px;
}

/* PC 대응 */
@media(min-width:900px){
  .wrap{
    max-width:600px;
  }
}
</style>
</head>

<body>

<div class="wrap">

<!-- 메인 이미지 -->
<div class="hero">
  <img src="images/main-hero.jpg" alt="메인 이미지">
</div>

<!-- 가이드 -->
<div class="section">

  <div class="accordion">

    <!-- 신입 -->
    <div class="acc-item">
      <button class="acc-header">신입 가이드</button>
      <div class="acc-body">
        <a href="newcomer-nickname.html">닉네임 설정</a>
        <a href="newcomer-chat.html">채팅 규칙</a>
      </div>
    </div>

    <!-- 주최자 -->
    <div class="acc-item">
      <button class="acc-header">주최자 가이드</button>
      <div class="acc-body">
        <a href="host-recruit.html">레이드 모집</a>
        <a href="host-mention.html">멘션콜 방법</a>
      </div>
    </div>

    <!-- 참여자 -->
    <div class="acc-item">
      <button class="acc-header">참여자 가이드</button>
      <div class="acc-body">
        <a href="participant-join.html">레이드 참여 방법</a>
      </div>
    </div>

  </div>

</div>

<!-- Q&A -->
<div class="section qna">

  <h2>빠른 질문</h2>

  <div class="qna-item">
    <div class="q">Q. 닉네임은 왜 한글로 해야 하나요?</div>
    <div class="a">모든 유저분들이 부르기 편하도록 한글 사용을 권장합니다.</div>
  </div>

  <div class="qna-item">
    <div class="q">Q. 레이드 모집은 아무나 해도 되나요?</div>
    <div class="a">가이드 숙지 후 가능합니다. 규칙을 반드시 지켜주세요.</div>
  </div>

  <div class="qna-item">
    <div class="q">Q. 채팅 규칙을 안 지키면 어떻게 되나요?</div>
    <div class="a">경고 또는 불이익이 발생할 수 있습니다.</div>
  </div>

</div>

</div>

<script>
document.querySelectorAll(".acc-header").forEach(btn=>{
  btn.addEventListener("click",()=>{
    const body = btn.nextElementSibling;
    const isOpen = body.style.display === "block";

    document.querySelectorAll(".acc-body").forEach(b=>b.style.display="none");

    if(!isOpen){
      body.style.display = "block";
    }
  });
});
</script>

</body>
</html>
