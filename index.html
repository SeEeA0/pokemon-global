<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokémon GO Global 🌏 가이드북</title>

<style>
body{
  margin:0;
  font-family:'Pretendard', sans-serif;
  background:#f5f6f8;
  color:#222;
}

/* 전체 */
.wrap{
  max-width:520px;
  margin:0 auto;
}

/* 히어로 */
.hero img{
  width:100%;
  display:block;
}

/* 카테고리 */
.section{
  padding:24px;
}

.card{
  display:block;
  padding:20px;
  margin-bottom:14px;
  border-radius:18px;
  background:#fff;
  text-decoration:none;
  color:#000;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
  transition:0.2s;
}

.card:hover{
  transform:translateY(-3px);
}

.card h2{
  margin:0;
  font-size:20px;
}

.card p{
  margin-top:6px;
  color:#666;
  font-size:14px;
}

/* Q&A */
.qna{
  padding:24px;
}

.qna h2{
  font-size:20px;
  margin-bottom:12px;
}

.qna-item{
  background:#fff;
  padding:16px;
  border-radius:14px;
  margin-bottom:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.q{
  font-weight:700;
  margin-bottom:6px;
}

.a{
  color:#666;
  font-size:14px;
}

/* PC */
@media(min-width:900px){
  .wrap{
    max-width:600px;
  }
}
</style>
</head>

<body>

<div class="wrap">

<!-- 메인 이미지 -->
<div class="hero">
  <img src="/hero-main.jpg" alt="메인">
</div>

<!-- 카테고리 -->
<div class="section">

  <a href="newcomer.html" class="card">
    <h2>신입 가이드</h2>
    <p>처음 오신 분들을 위한 필수 가이드</p>
  </a>

  <a href="host.html" class="card">
    <h2>주최자 가이드</h2>
    <p>레이드를 주최할 때 필요한 모든 방법</p>
  </a>

  <a href="participant.html" class="card">
    <h2>참여자 가이드</h2>
    <p>레이드 참여 방법과 주의사항</p>
  </a>

</div>

<!-- Q&A -->
<div class="qna">

  <h2>빠른 질문</h2>

  <div class="qna-item">
    <div class="q">Q. 닉네임은 왜 영어로 해야 하나요?</div>
    <div class="a">인게임 검색을 위해 영문 사용을 권장합니다.</div>
  </div>

  <div class="qna-item">
    <div class="q">Q. 레이드 참여는 어떻게 하나요?</div>
    <div class="a">참여 가이드를 확인해주세요.</div>
  </div>

</div>

</div>

</body>
</html>
