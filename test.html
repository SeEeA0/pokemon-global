<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pokémon GO Global | Trainer Test</title>

<meta name="description" content="Trainer Test" />
<meta property="og:title" content="Pokémon GO Global | Trainer Test" />
<meta property="og:description" content="나의 트레이너 결과를 확인해보세요." />
<meta property="og:image" content="https://pokemon-global.pages.dev/og2.jpg" />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://pokemon-global.pages.dev/" />

<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  color:#243746;
  background:#edf2f5;
}
.hidden{display:none!important}

.wrap{
  max-width:560px;
  margin:0 auto;
  padding:20px 16px 80px;
}

.card{
  background:#fff;
  border-radius:24px;
  box-shadow:0 12px 30px rgba(31,42,68,.08);
  padding:20px;
  margin-bottom:16px;
}

.hero{
  padding:24px 20px;
  border-radius:28px;
  background:
    radial-gradient(circle at 50% 10%, rgba(255,255,255,.16), transparent 22%),
    linear-gradient(180deg,#21455b 0%, #2e7a8c 42%, #c6bb8c 100%);
  color:#fff;
  box-shadow:0 14px 28px rgba(31,42,68,.14);
  margin-bottom:16px;
}
.hero h1{
  margin:0 0 8px;
  font-size:30px;
  line-height:1.2;
}
.hero p{
  margin:0;
  opacity:.9;
  font-size:14px;
}

.label{
  display:block;
  margin:14px 0 8px;
  font-size:14px;
  font-weight:800;
}
.input{
  width:100%;
  height:52px;
  border-radius:14px;
  border:1px solid #d8e0e8;
  padding:0 14px;
  font-size:15px;
  outline:none;
}
.input:focus{
  border-color:#6fa2bb;
  box-shadow:0 0 0 4px rgba(94,154,186,.12);
}
.input-error{
  border-color:#ff6b7f!important;
  box-shadow:0 0 0 4px rgba(255,107,127,.12)!important;
}
.helper{
  margin-top:8px;
  color:#7a8792;
  font-size:12px;
}

.btn-row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:18px;
}
.btn{
  appearance:none;
  border:0;
  cursor:pointer;
  min-height:52px;
  padding:0 18px;
  border-radius:14px;
  font-size:15px;
  font-weight:800;
}
.btn-primary{
  color:#fff;
  background:linear-gradient(135deg,#31718a 0%, #2f9b9b 100%);
  box-shadow:0 10px 20px rgba(47,122,140,.24);
}
.btn-secondary{
  background:#edf2f5;
  color:#21343f;
}
.btn:disabled{
  opacity:.45;
  cursor:not-allowed;
}

.progress-box{
  margin-bottom:16px;
}
.progress-meta{
  display:flex;
  justify-content:space-between;
  margin-bottom:8px;
  font-size:13px;
  color:#647482;
  font-weight:700;
}
.progress-bar{
  height:8px;
  border-radius:999px;
  background:#e8edf1;
  overflow:hidden;
}
.progress-fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#6cc7c2,#66d8a7);
  transition:width .3s ease;
}

.question-page-head{
  margin-bottom:16px;
}
.question-page-head strong{
  display:block;
  font-size:18px;
  margin-bottom:6px;
}
.question-page-head p{
  margin:0;
  color:#7a8792;
  font-size:13px;
}

.question-card{
  background:#fff;
  border-radius:20px;
  box-shadow:0 10px 24px rgba(31,42,68,.06);
  padding:18px;
  margin-bottom:14px;
}
.q-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
}
.q-badge{
  padding:6px 12px;
  border-radius:999px;
  background:#eaf3f8;
  color:#35657d;
  font-size:12px;
  font-weight:800;
}
.q-title{
  font-size:17px;
  font-weight:800;
  margin:0 0 14px;
  line-height:1.5;
}
.options{
  display:grid;
  gap:10px;
}
.option{
  display:flex;
  gap:10px;
  align-items:flex-start;
  border:1px solid #e7edf2;
  border-radius:16px;
  padding:14px;
  cursor:pointer;
  background:#fff;
  transition:border-color .2s ease, background .2s ease;
}
.option:hover{
  border-color:#bfd6e2;
  background:#fbfdff;
}
.option input{
  margin-top:3px;
}
.option span{
  font-size:14px;
  line-height:1.5;
}

/* result */
.divider,
.item-grid{
  display:none;
}

.result-screen{
  position:relative;
  overflow:hidden;
  min-height:980px;
  border-radius:32px;
  background:
    radial-gradient(circle at 50% 12%, rgba(255,255,255,.18), transparent 24%),
    linear-gradient(180deg,#21455b 0%, #2e7a8c 42%, #c6bb8c 100%);
  color:#fff;
  box-shadow:0 18px 36px rgba(31,42,68,.18);
}
.result-top{
  position:relative;
  padding:4px 18px 0;
  min-height:220px;
}

.lv-text{
  display:flex;
  align-items:flex-end;
  justify-content:center;
  gap:8px;
  text-align:center;
  margin-top:16px;
  min-height:52px;
  color:#fff;
}
.lv-prefix{
  font-size:18px;
  line-height:1;
  font-weight:300;
  opacity:.92;
  letter-spacing:-.01em;
  transform:translateY(-4px);
}
#resultLevel{
  display:inline-block;
  min-width:2ch;
  font-size:48px;
  line-height:1;
  font-weight:300;
  letter-spacing:-.04em;
}

.arc{
  width:100%;
  max-width:430px;
  margin:8px auto 0;
  display:block;
}

.pogo-wrap{
  position:absolute;
  left:50%;
  top:140px;
  transform:translateX(-50%);
  width:200px;
  z-index:3;
}
.pogo-wrap img{
  width:100%;
  display:block;
  filter:drop-shadow(0 12px 18px rgba(0,0,0,.18));
}

.result-card{
  position:relative;
  margin:10px 14px 0;
  background:#f8fafc;
  border-radius:26px 26px 0 0;
  min-height:700px;
  color:#3c6670;
  padding:118px 22px 30px;
}
.nickname{
  text-align:center;
  font-size:32px;
  font-weight:700;
  letter-spacing:-.03em;
}
.hp-line{
  width:72%;
  height:10px;
  border-radius:999px;
  background:#d9f7eb;
  margin:18px auto 6px;
  position:relative;
  overflow:hidden;
}
.hp-fill{
  width:100%;
  height:100%;
  border-radius:999px;
  background:#69e0b8;
}
.hp-text{
  text-align:center;
  font-size:14px;
  font-weight:700;
  color:#516e77;
}

.info-3{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:0;
  align-items:start;
  margin-top:34px;
  text-align:center;
}
.info-col{
  position:relative;
  padding:0 6px;
}
.info-col:not(:last-child):after{
  content:"";
  position:absolute;
  right:0;
  top:12px;
  width:1px;
  height:64px;
  background:#d6dde2;
}
.info-value{
  font-size:28px;
  font-weight:700;
  letter-spacing:-.03em;
}
.info-label{
  margin-top:4px;
  font-size:12px;
  color:#7f9298;
}
.info-icon{
  width:38px;
  height:38px;
  object-fit:contain;
  display:block;
  margin:0 auto 8px;
}

/* badge */
.appraisal-badge{
  position:absolute;
  left:8px;
  top:540px;
  width:140px;
  height:140px;
  z-index:6;
}
.badge-ring{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
  filter:drop-shadow(0 6px 10px rgba(0,0,0,.15));
}
.badge-stars{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:4px;
}
.badge-star{
  font-size:26px;
  line-height:1;
  color:#f6a623;
  text-shadow:0 2px 4px rgba(0,0,0,.12);
  opacity:0;
  transform:scale(.5);
}
.badge-star.show{
  opacity:1;
  transform:scale(1);
  transition:all .28s cubic-bezier(.22,.61,.36,1);
}
.badge-star.red-star{
  color:#f05d7c;
  text-shadow:0 2px 6px rgba(0,0,0,.18), 0 0 8px rgba(240,93,124,.28);
}
.badge-star.outline{
  opacity:1;
  transform:scale(1);
  color:transparent;
  -webkit-text-stroke:1.6px #f6d39a;
  text-shadow:none;
}

/* stats */
.appraisal-panel{
  position:absolute;
  left:38px;
  right:134px;
  top:650px;
  background:#fff;
  border-radius:14px;
  padding:18px 18px 16px;
  z-index:5;
  box-shadow:0 10px 22px rgba(0,0,0,.08);
}
.stat-row{
  margin-bottom:18px;
}
.stat-row:last-child{margin-bottom:0}
.stat-label{
  font-size:14px;
  font-weight:800;
  color:#e78a76;
  margin-bottom:8px;
}
.stat-bar{
  height:16px;
  border-radius:999px;
  background:#eceff2;
  overflow:hidden;
  position:relative;
}
.stat-fill{
  width:0%;
  height:100%;
  border-radius:999px;
  background:#eb8b7e;
  transition:width .9s ease;
}
.stat-bar.orange .stat-fill{
  background:#f1a01b;
}
.stat-bar.red .stat-fill{
  background:#e58b88;
}
.segment-line{
  position:absolute;
  top:0;
  bottom:0;
  width:3px;
  background:#fff;
  opacity:.95;
}
.segment-line.one{left:33.333%}
.segment-line.two{left:66.666%}

/* character + speech */
.result-character{
  position:absolute;
  right:-8px;
  bottom:0px;
  width:180px;
  z-index:6;
  pointer-events:none;
}
.result-character img{
  width:100%;
  display:block;
  filter:drop-shadow(0 14px 18px rgba(0,0,0,.18));
}

.speech-box{
  position:absolute;
  left:14px;
  right:14px;
  bottom:14px;
  background:#fff;
  color:#516e77;
  border-radius:14px;
  padding:20px 16px;
  box-shadow:0 8px 18px rgba(0,0,0,.07);
  z-index:7;
  font-size:18px;
  line-height:1.55;
  font-weight:600;
}
.speech-box:before{
  content:"";
  position:absolute;
  top:-10px;
  left:50%;
  transform:translateX(-50%);
  border-left:10px solid transparent;
  border-right:10px solid transparent;
  border-bottom:10px solid #fff;
}

.result-actions{
  margin-top:16px;
}
.share-preview{
  margin-top:14px;
  font-size:12px;
  color:#7e8b95;
  line-height:1.5;
}
</style>
</head>
<body>

<div class="wrap">
  <section class="hero">
    <h1>Trainer Test</h1>
    <p>레벨과 닉네임을 입력하고 테스트를 진행해 주세요.</p>
  </section>

  <section class="card" id="introSection">
    <label class="label" for="trainerLevel">트레이너 레벨 (1~80)</label>
    <input
      class="input"
      type="text"
      id="trainerLevel"
      inputmode="numeric"
      maxlength="2"
      placeholder="1 - 80"
      autocomplete="off"
    >

    <label class="label" for="nickname">닉네임 (글로벌 톡방의 한글 닉네임)</label>
     <input class="input" type="text" id="nickname" placeholder="한글 닉네임 입력" autocomplete="off">
  <div class="helper">한글만 입력되며 공백은 자동 제거됩니다.</div>

  <div class="btn-row">
    <button class="btn btn-primary" type="button" id="startBtn">테스트 시작하기</button>
  </div>
</section>

  <section class="hidden" id="quizSection">
    <div class="card">
      <div class="progress-box">
        <div class="progress-meta">
          <span id="pageRangeText">1 - 3 / 15</span>
          <span id="pageStepText">1 / 5</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <div class="question-page-head">
        <strong>테스트 진행 중</strong>
        <p>각 페이지마다 3문항씩 표시됩니다.</p>
      </div>

      <form id="quizForm">
        <div id="questionArea"></div>

        <div class="btn-row">
          <button class="btn btn-secondary" type="button" id="prevBtn">이전</button>
          <button class="btn btn-primary" type="button" id="nextBtn">다음</button>
          <button class="btn btn-primary hidden" type="submit" id="submitBtn">결과 보기</button>
        </div>
      </form>
    </div>
  </section>

  <section id="resultSection" class="hidden">
    <div class="result-screen" id="captureTarget">
      <div class="result-top">
        <div class="lv-text">
          <span class="lv-prefix">Trainer Lv.</span>
          <span id="resultLevel">15</span>
        </div>

        <svg class="arc" viewBox="0 0 500 210" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M50 190 Q250 20 450 190" stroke="rgba(255,255,255,.92)" stroke-width="4" stroke-linecap="round"/>
        </svg>

        <div class="pogo-wrap">
          <img id="resultPogo" src="" alt="pogo character">
        </div>
      </div>

      <div class="result-card">
        <div class="nickname" id="resultNickname">닉네임</div>

        <div class="hp-line"><div class="hp-fill"></div></div>
        <div class="hp-text" id="resultHpText">121 / 121 HP</div>

        <div class="info-3">
          <div class="info-col">
            <div class="info-value" id="resultWeight">9.57kg</div>
            <div class="info-label">참여 시간</div>
          </div>
          <div class="info-col">
            <img class="info-icon" id="resultIcon" src="" alt="icon">
            <div class="info-label">타입</div>
          </div>
          <div class="info-col">
            <div class="info-value" id="resultHeight">26.320m</div>
            <div class="info-label">참여 날짜</div>
          </div>
        </div>
      </div>

      <div class="appraisal-badge">
        <img src="./images/badge-ring.png" class="badge-ring" alt="badge ring">
        <div class="badge-stars" id="badgeStars">
          <span class="badge-star">★</span>
          <span class="badge-star">★</span>
          <span class="badge-star">★</span>
        </div>
      </div>

      <div class="appraisal-panel">
        <div class="stat-row">
          <div class="stat-label">주최자</div>
          <div class="stat-bar orange" id="hostBar">
            <div class="stat-fill" id="hostFill"></div>
            <span class="segment-line one"></span>
            <span class="segment-line two"></span>
          </div>
        </div>
        <div class="stat-row">
          <div class="stat-label">참여자</div>
          <div class="stat-bar orange" id="participantBar">
            <div class="stat-fill" id="participantFill"></div>
            <span class="segment-line one"></span>
            <span class="segment-line two"></span>
          </div>
        </div>
        <div class="stat-row">
          <div class="stat-label">채팅창 규칙</div>
          <div class="stat-bar orange" id="chatBar">
            <div class="stat-fill" id="chatFill"></div>
            <span class="segment-line one"></span>
            <span class="segment-line two"></span>
          </div>
        </div>
      </div>

      <div class="result-character">
        <img id="resultCharacter" src="" alt="character">
      </div>

      <div class="speech-box" id="speechText">
        결과 분석 중입니다.
      </div>
    </div>

    <div class="result-actions">
      <div class="btn-row">
        <button class="btn btn-primary" type="button" id="shareBtn">카카오톡 공유하기</button>
        <button class="btn btn-secondary" type="button" id="downloadBtn">결과 이미지 저장</button>
        <button class="btn btn-secondary" type="button" id="retryBtn">다시 테스트하기</button>
      </div>
      <div class="share-preview">
        카카오 공유용 이미지는 결과 카드 영역을 캡처해 자동 생성하는 구조입니다.
      </div>
    </div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

let currentTime = '';
let currentDate = '';

function setCurrentDateTime() {
  const now = new Date();
  const hours = String(now.getHours()).padStart(2, '0');
  const minutes = String(now.getMinutes()).padStart(2, '0');
  currentTime = `${hours}:${minutes}`;

  const year = now.getFullYear();
  const month = String(now.getMonth() + 1).padStart(2, '0');

}

let shuffledQuestions = [];
let answers = {};
let currentPage = 0;
const QUESTIONS_PER_PAGE = 3;
const TOTAL_PAGES = 5;

const introSection = document.getElementById('introSection');
const quizSection = document.getElementById('quizSection');
const resultSection = document.getElementById('resultSection');

const trainerLevel = document.getElementById('trainerLevel');
const nickname = document.getElementById('nickname');
const questionArea = document.getElementById('questionArea');
const progressFill = document.getElementById('progressFill');
const pageRangeText = document.getElementById('pageRangeText');
const pageStepText = document.getElementById('pageStepText');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const submitBtn = document.getElementById('submitBtn');

nickname.addEventListener('input', () => {
  nickname.value = nickname.value.replace(/\s+/g, '').replace(/[^ㄱ-ㅎ가-힣ㅏ-ㅣ]/g, '');
  if (/^[ㄱ-ㅎ가-힣ㅏ-ㅣ]{0,8}$/.test(nickname.value)) {
    nickname.classList.remove('input-error');
  } else {
    nickname.classList.add('input-error');
  }
});

trainerLevel.addEventListener('input', () => {
  trainerLevel.value = trainerLevel.value.replace(/[^0-9]/g, '');
  if (trainerLevel.value === '') return;
  let v = Number(trainerLevel.value);
  if (v < 1) trainerLevel.value = '1';
  if (v > 80) trainerLevel.value = '80';
});

function validateTrainerLevel() {
  const v = Number(trainerLevel.value);
  if (!Number.isInteger(v) || v < 1 || v > 80) {
    alert('트레이너 레벨은 1부터 80까지만 입력 가능합니다.');
    trainerLevel.focus();
    return false;
  }
  return true;
}

function validateNickname() {
  const value = nickname.value.trim();
  if (!value) {
    alert('닉네임을 입력해주세요.');
    nickname.focus();
    return false;
  }
  if (!/^[ㄱ-ㅎ가-힣ㅏ-ㅣ]{2,8}$/.test(value)) {
    alert('닉네임은 한글만 가능하며 2~8글자여야 합니다.');
    nickname.focus();
    return false;
  }
  return true;
}

function shuffleArray(arr) {
  const copy = [...arr];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function showIntro() {
  introSection.classList.remove('hidden');
  quizSection.classList.add('hidden');
  resultSection.classList.add('hidden');
}
function showQuiz() {
  introSection.classList.add('hidden');
  quizSection.classList.remove('hidden');
  resultSection.classList.add('hidden');
}
function showResult() {
  introSection.classList.add('hidden');
  quizSection.classList.add('hidden');
  resultSection.classList.remove('hidden');
}

function formatWeightFromTime(timeValue) {
  const [h, m] = timeValue.split(':');
  return `${Number(h)}.${m}kg`;
}
function formatHeightFromDate(dateValue) {
  const date = new Date(dateValue + 'T00:00:00');
  const yy = String(date.getFullYear()).slice(2);
  const month = date.getMonth() + 1;
  const day = String(date.getDate()).padStart(2, '0');
  return `${yy}.${month}${day}m`;
}
function getRandomHp() {
  return Math.floor(Math.random() * (400 - 20 + 1)) + 20;
}
function getRandomAssetIndex() {
  return Math.floor(Math.random() * 18) + 1;
}
function getAssets(index) {
  return {
    pogo: `./images/pogo-${index}.png`,
    icon: `./images/icon-${index}.png`,
    advisor: `./images/advisor-1.png`
  };
}

function renderCurrentPage() {
  const start = currentPage * QUESTIONS_PER_PAGE;
  const end = start + QUESTIONS_PER_PAGE;
  const pageQuestions = shuffledQuestions.slice(start, end);

  pageRangeText.textContent = `${start + 1} - ${Math.min(end, 15)} / 15`;
  pageStepText.textContent = `${currentPage + 1} / 5`;
  progressFill.style.width = `${((currentPage + 1) / TOTAL_PAGES) * 100}%`;

  questionArea.innerHTML = pageQuestions.map((item, idx) => {
    const absoluteIndex = start + idx;
    return `
      <div class="question-card">
        <div class="q-top">
          <div class="q-badge">Q${absoluteIndex + 1}</div>
        </div>
        <h3 class="q-title">${item.question}</h3>
        <div class="options">
          ${item.options.map((optionText, optionIndex) => `
            <label class="option">
              <input
                type="radio"
                name="q-${item.no}"
                value="${optionIndex + 1}"
                ${answers[item.no] === (optionIndex + 1) ? 'checked' : ''}
              >
              <span>${optionText}</span>
            </label>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');

  prevBtn.disabled = currentPage === 0;
  if (currentPage === TOTAL_PAGES - 1) {
    nextBtn.classList.add('hidden');
    submitBtn.classList.remove('hidden');
  } else {
    nextBtn.classList.remove('hidden');
    submitBtn.classList.add('hidden');
  }
}

function saveCurrentPageAnswers() {
  const start = currentPage * QUESTIONS_PER_PAGE;
  const end = start + QUESTIONS_PER_PAGE;
  const pageQuestions = shuffledQuestions.slice(start, end);

  pageQuestions.forEach((q) => {
    const checked = quizForm.querySelector(`input[name="q-${q.no}"]:checked`);
    if (checked) answers[q.no] = Number(checked.value);
  });
}

function pageAnsweredCount() {
  const start = currentPage * QUESTIONS_PER_PAGE;
  const end = start + QUESTIONS_PER_PAGE;
  const pageQuestions = shuffledQuestions.slice(start, end);
  let count = 0;
  pageQuestions.forEach((q) => {
    if (quizForm.querySelector(`input[name="q-${q.no}"]:checked`) || answers[q.no]) count++;
  });
  return count;
}

document.getElementById('startBtn').addEventListener('click', () => {
  if (!validateTrainerLevel()) return;

  answers = {};
  currentPage = 0;

  showQuiz();
  renderCurrentPage();
  window.scrollTo({ top:0, behavior:'smooth' });
});

prevBtn.addEventListener('click', () => {
  saveCurrentPageAnswers();
  if (currentPage > 0) {
    currentPage--;
    renderCurrentPage();
    window.scrollTo({ top:0, behavior:'smooth' });
  }
});

nextBtn.addEventListener('click', () => {
  saveCurrentPageAnswers();
  if (pageAnsweredCount() < QUESTIONS_PER_PAGE) {
    alert('현재 페이지의 3문항을 모두 선택해 주세요.');
    return;
  }
  if (currentPage < TOTAL_PAGES - 1) {
    currentPage++;
    renderCurrentPage();
    window.scrollTo({ top:0, behavior:'smooth' });
  }
});

function countGroupCorrect(groupName) {
  return shuffledQuestions
    .filter(q => q.group === groupName)
    .reduce((sum, q) => sum + (answers[q.no] === q.correct ? 1 : 0), 0);
}

function getTotalCorrect() {
  return shuffledQuestions.reduce((sum, q) => sum + (answers[q.no] === q.correct ? 1 : 0), 0);
}

function statCountToPercent(correctCount) {
  switch (correctCount) {
    case 0: return 0;
    case 1: return 16.6667;
    case 2: return 33.3333;
    case 3: return 66.6667;
    case 4: return 83.3333;
    case 5: return 100;
    default: return 0;
  }
}

function getStarData(totalCorrect) {
  if (totalCorrect === 15) return { stars: 3, theme: 'red', redStars: true };
  if (totalCorrect >= 12) return { stars: 3, theme: 'orange', redStars: false };
  if (totalCorrect >= 9) return { stars: 2, theme: 'orange', redStars: false };
  if (totalCorrect >= 6) return { stars: 1, theme: 'orange', redStars: false };
  return { stars: 0, theme: 'orange', redStars: false };
}

function getSpeech(totalCorrect) {
  if (totalCorrect === 15) return '완벽합니다. 이 트레이너는 모든 가이드 흐름과 채팅 규칙을 정확히 이해하고 있습니다.';
  if (totalCorrect >= 12) return '아주 좋습니다. 이 트레이너는 전체 흐름을 안정적으로 이해하고 있습니다.';
  if (totalCorrect >= 9) return '좋습니다. 핵심 흐름은 잘 잡았고, 조금만 더 익히면 더욱 좋아집니다.';
  if (totalCorrect >= 6) return '기본 이해는 되어 있습니다. 가이드를 한 번 더 읽으면 훨씬 수월해질 거예요.';
  return '먼저 기본 가이드와 채팅 규칙부터 다시 확인하는 것을 추천합니다.';
}

function animateLevelUp(targetLevel) {
  const el = document.getElementById('resultLevel');
  const startLevel = 15;
  const endLevel = Number(targetLevel);

  if (!el || Number.isNaN(endLevel)) return;

  if (endLevel <= startLevel) {
    el.textContent = endLevel;
    return;
  }

  const duration = 900;
  const startTime = performance.now();

  function tick(now) {
    const progress = Math.min((now - startTime) / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    const current = Math.round(startLevel + (endLevel - startLevel) * eased);

    el.textContent = current;

    if (progress < 1) {
      requestAnimationFrame(tick);
    } else {
      el.textContent = endLevel;
    }
  }

  el.textContent = startLevel;
  requestAnimationFrame(tick);
}

let currentRendered = null;

quizForm.addEventListener('submit', (e) => {
  e.preventDefault();

  saveCurrentPageAnswers();

  if (Object.keys(answers).length < 15) {
    alert('모든 문항에 답변해 주세요.');
    return;
  }

  const hostCorrect = countGroupCorrect('host');
  const participantCorrect = countGroupCorrect('participant');
  const chatCorrect = countGroupCorrect('chat');
  const totalCorrect = getTotalCorrect();

  const hostPercent = statCountToPercent(hostCorrect);
  const participantPercent = statCountToPercent(participantCorrect);
  const chatPercent = statCountToPercent(chatCorrect);

  const starData = getStarData(totalCorrect);
  const assetIndex = getRandomAssetIndex();
  const assets = getAssets(assetIndex);
  const randomHp = getRandomHp();

  currentRendered = {
    hostCorrect, participantCorrect, chatCorrect, totalCorrect,
    hostPercent, participantPercent, chatPercent,
    starData, assets, randomHp
  };

  document.getElementById('resultLevel').textContent = '15';
  document.getElementById('resultNickname').textContent = nickname.value;
  document.getElementById('resultWeight').textContent = formatWeightFromTime(currentTime);
  document.getElementById('resultHeight').textContent = formatHeightFromDate(currentDate);
  document.getElementById('resultHpText').textContent = `${randomHp} / ${randomHp} HP`;

  document.getElementById('resultPogo').src = assets.pogo;
  document.getElementById('resultIcon').src = assets.icon;
  document.getElementById('resultCharacter').src = assets.advisor;

  document.getElementById('speechText').textContent = getSpeech(totalCorrect);

  document.getElementById('hostBar').className = `stat-bar ${starData.theme}`;
  document.getElementById('participantBar').className = `stat-bar ${starData.theme}`;
  document.getElementById('chatBar').className = `stat-bar ${starData.theme}`;

  document.getElementById('hostFill').style.width = '0%';
  document.getElementById('participantFill').style.width = '0%';
  document.getElementById('chatFill').style.width = '0%';

  const badgeStars = document.querySelectorAll('.badge-star');
  badgeStars.forEach(star => {
    star.classList.remove('show', 'red-star', 'outline');
  });

  showResult();
  window.scrollTo({ top:0, behavior:'smooth' });

  setTimeout(() => {
    document.getElementById('hostFill').style.width = `${hostPercent}%`;
    document.getElementById('participantFill').style.width = `${participantPercent}%`;
    document.getElementById('chatFill').style.width = `${chatPercent}%`;
  }, 140);

  setTimeout(() => {
    if (starData.stars === 0) {
      badgeStars.forEach(star => {
        star.classList.add('outline');
      });
    } else {
      for (let i = 0; i < badgeStars.length; i++) {
        if (i < starData.stars) {
          setTimeout(() => {
            badgeStars[i].classList.add('show');
            if (starData.redStars) {
              badgeStars[i].classList.add('red-star');
            }
          }, i * 180);
        } else {
          badgeStars[i].classList.add('outline');
        }
      }
    }
  }, 420);

  setTimeout(() => {
    animateLevelUp(trainerLevel.value);
  }, 760);
});
