<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Pokémon GO Global | 내타입 포켓몬 확인하기</title>
<link rel="icon" href="/images/favicon.png" />
  
<meta name="description" content="Trainer Test" />
<meta property="og:title" content="Pokémon GO Global | Trainer Test" />
<meta property="og:description" content="나와 같은타입의 포켓몬을 확인해보세요." />
<meta property="og:image" content="https://pokemon-global.pages.dev/og2.jpg" />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://pokemon-global.pages.dev/" />

<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0}
:root{
  --bg:#eef2f8;
  --bg-soft:#f6f8fc;
  --card:#ffffff;
  --text:#243746;
  --text-soft:#6f7f90;
  --line:#dde5ee;

  --primary-1:#8e7dff;
  --primary-2:#5f69ff;
  --primary-3:#3a48be;

  --space-1:#131a46;
  --space-2:#1d2b6d;
  --space-3:#3a3f96;
  --space-4:#6c58c8;
  --space-5:#9f83e8;

  --mint:#78f0d0;
  --mint-soft:#dbfff4;

  --shadow-soft:0 12px 30px rgba(22,31,63,.08);
  --shadow-card:0 20px 40px rgba(18,26,60,.10);
  --shadow-cta:0 14px 28px rgba(83,92,222,.28);

  --radius-card:24px;
  --radius-soft:18px;
  --radius-pill:999px;

  --ease:cubic-bezier(.22,.61,.36,1);
}

body{
  font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top, rgba(160,170,255,.16), transparent 26%),
    linear-gradient(180deg,#eef2f8 0%, #edf1f7 100%);
  -webkit-text-size-adjust:100%;
}
.hidden{display:none!important}

.wrap{
  max-width:560px;
  margin:0 auto;
  padding:22px 16px 80px;
}

.card{
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.7);
  border-radius:var(--radius-card);
  box-shadow:var(--shadow-soft);
  padding:22px;
  margin-bottom:16px;
}

.hero{
  position:relative;
  overflow:hidden;
  padding:28px 22px 24px;
  border-radius:28px;
  background:
    radial-gradient(circle at 50% 0%, rgba(255,255,255,.20), transparent 28%),
    radial-gradient(circle at 84% 18%, rgba(163,132,255,.36), transparent 22%),
    radial-gradient(circle at 14% 22%, rgba(107,164,255,.16), transparent 18%),
    linear-gradient(180deg,#121842 0%, #1c2a6b 38%, #3d4299 68%, #7459d2 100%);
  color:#fff;
  box-shadow:0 16px 34px rgba(21,29,72,.22);
  margin-bottom:16px;
}
.hero:before{
  content:"";
  position:absolute;
  inset:-40% auto auto -10%;
  width:220px;
  height:220px;
  background:radial-gradient(circle, rgba(255,255,255,.10), transparent 68%);
  pointer-events:none;
}
.hero:after{
  content:"";
  position:absolute;
  right:18px;
  top:18px;
  width:84px;
  height:84px;
  border-radius:50%;
  background:
    radial-gradient(circle at 35% 35%, rgba(255,255,255,.85) 0 2px, transparent 3px),
    radial-gradient(circle at 68% 22%, rgba(255,255,255,.5) 0 1.5px, transparent 2.5px),
    radial-gradient(circle at 72% 62%, rgba(255,255,255,.35) 0 1.5px, transparent 2.5px),
    radial-gradient(circle at 28% 74%, rgba(255,255,255,.4) 0 1.5px, transparent 2.5px),
    radial-gradient(circle, rgba(255,255,255,.12), transparent 72%);
  opacity:.9;
  pointer-events:none;
}
.hero h1{
  position:relative;
  margin:0 0 8px;
  font-size:30px;
  line-height:1.18;
  letter-spacing:-.03em;
  font-weight:800;
}
.hero p{
  position:relative;
  margin:0;
  opacity:.92;
  font-size:14px;
  line-height:1.55;
}

.label{
  display:block;
  margin:14px 0 8px;
  font-size:14px;
  font-weight:800;
  color:#1e2e4e;
}
.input{
  width:100%;
  height:54px;
  border-radius:15px;
  border:1px solid #d7e0ee;
  background:#fbfcff;
  padding:0 16px;
  font-size:16px;
  outline:none;
  color:#22364b;
  transition:border-color .2s ease, box-shadow .2s ease, background .2s ease;
  -webkit-appearance:none;
  appearance:none;
  transform:translateZ(0);
}
.input::placeholder{
  color:#9aa7b6;
}
.input:focus{
  border-color:#7d84ff;
  background:#fff;
  box-shadow:0 0 0 4px rgba(114,122,255,.12);
}
.input-error{
  border-color:#ff6b7f!important;
  box-shadow:0 0 0 4px rgba(255,107,127,.12)!important;
}
.helper{
  margin-top:8px;
  color:#7a8792;
  font-size:12px;
  line-height:1.5;
}

.btn-row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:18px;
}
.btn{
  appearance:none;
  border:0;
  cursor:pointer;
  min-height:52px;
  padding:0 18px;
  border-radius:15px;
  font-size:15px;
  font-weight:800;
  transition:transform .18s var(--ease), box-shadow .18s var(--ease), opacity .18s ease, background .18s ease;
}
.btn:hover{
  transform:translateY(-1px);
}
.btn:active{
  transform:translateY(0);
}
.btn-primary{
  color:#fff;
  background:
    linear-gradient(135deg, rgba(255,255,255,.18), rgba(255,255,255,0) 34%),
    linear-gradient(135deg,#7b78ff 0%, #5b66ff 42%, #3e4dc8 100%);
  box-shadow:var(--shadow-cta);
}
.btn-secondary{
  background:#edf2fb;
  color:#25365c;
  box-shadow:0 8px 18px rgba(44,58,119,.08);
}
.btn:disabled{
  opacity:.45;
  cursor:not-allowed;
  transform:none;
}

.progress-box{
  margin-bottom:16px;
}
.progress-meta{
  display:flex;
  justify-content:space-between;
  margin-bottom:8px;
  font-size:13px;
  color:#647482;
  font-weight:700;
}
.progress-bar{
  height:8px;
  border-radius:999px;
  background:#e8edf5;
  overflow:hidden;
}
.progress-fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#8d85ff 0%, #72dfff 55%, #7ef0cb 100%);
  transition:width .35s ease;
}

.question-page-head{
  margin-bottom:16px;
}
.question-page-head strong{
  display:block;
  font-size:18px;
  margin-bottom:6px;
  color:#1c2b4c;
}
.question-page-head p{
  margin:0;
  color:#7a8792;
  font-size:13px;
}

.question-card{
  background:linear-gradient(180deg,#ffffff 0%, #fbfcff 100%);
  border:1px solid #edf1f7;
  border-radius:20px;
  box-shadow:0 10px 24px rgba(31,42,68,.05);
  padding:18px;
  margin-bottom:14px;
}
.q-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
}
.q-badge{
  padding:6px 12px;
  border-radius:999px;
  background:linear-gradient(135deg,#eef2ff 0%, #edf7ff 100%);
  color:#4957b8;
  font-size:12px;
  font-weight:800;
  border:1px solid #dde5ff;
}
.q-title{
  font-size:17px;
  font-weight:800;
  margin:0 0 14px;
  line-height:1.5;
  color:#213351;
}
.options{
  display:grid;
  gap:10px;
}
.option{
  display:flex;
  gap:10px;
  align-items:flex-start;
  border:1px solid #e7edf2;
  border-radius:16px;
  padding:14px;
  cursor:pointer;
  background:#fff;
  transition:border-color .2s ease, background .2s ease, transform .18s ease;
}
.option:hover{
  border-color:#cbd5ff;
  background:#fafbff;
  transform:translateY(-1px);
}
.option input{
  margin-top:3px;
}
.option span{
  font-size:14px;
  line-height:1.5;
}

/* result */
.divider,
.item-grid{
  display:none;
}

.result-screen{
  position:relative;
  overflow:hidden;
  min-height:980px;
  border-radius:32px;
  background:
    radial-gradient(circle at 50% 10%, rgba(255,255,255,.16), transparent 18%),
    radial-gradient(circle at 18% 18%, rgba(129,161,255,.22), transparent 18%),
    radial-gradient(circle at 82% 16%, rgba(178,128,255,.22), transparent 18%),
    linear-gradient(180deg,#121842 0%, #1d2b6c 34%, #3a3f96 67%, #6d58c8 100%);
  color:#fff;
  box-shadow:0 18px 36px rgba(20,28,73,.24);
}
.result-screen:before{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 12% 20%, rgba(255,255,255,.9) 0 1.2px, transparent 1.8px),
    radial-gradient(circle at 22% 10%, rgba(255,255,255,.6) 0 1px, transparent 1.6px),
    radial-gradient(circle at 38% 14%, rgba(255,255,255,.85) 0 1.3px, transparent 1.8px),
    radial-gradient(circle at 61% 8%, rgba(255,255,255,.65) 0 1px, transparent 1.6px),
    radial-gradient(circle at 78% 18%, rgba(255,255,255,.8) 0 1.2px, transparent 1.8px),
    radial-gradient(circle at 88% 9%, rgba(255,255,255,.55) 0 1px, transparent 1.6px),
    radial-gradient(circle at 72% 28%, rgba(255,255,255,.55) 0 1px, transparent 1.5px);
  opacity:.55;
  pointer-events:none;
}
.result-top{
  position:relative;
  padding:4px 18px 0;
  min-height:220px;
  z-index:1;
}

.lv-text{
  display:flex;
  align-items:flex-end;
  justify-content:center;
  gap:8px;
  text-align:center;
  margin-top:16px;
  min-height:52px;
  color:#fff;
}
.lv-prefix{
  font-size:18px;
  line-height:1;
  font-weight:300;
  opacity:.92;
  letter-spacing:-.01em;
  transform:translateY(-4px);
}
#resultLevel{
  display:inline-block;
  min-width:2ch;
  font-size:48px;
  line-height:1;
  font-weight:300;
  letter-spacing:-.04em;
}

.arc{
  width:100%;
  max-width:430px;
  margin:8px auto 0;
  display:block;
}

.pogo-wrap{
  position:absolute;
  left:50%;
  top:110px;
  transform:translateX(-50%);
  width:220px;
  z-index:3;
}
.pogo-wrap img{
  width:100%;
  display:block;
  filter:none;
}

.result-card{
  position:relative;
  margin:10px 14px 0;
  background:linear-gradient(180deg,#f9fbff 0%, #f3f7fe 100%);
  border-radius:26px 26px 0 0;
  min-height:700px;
  color:#3c6670;
  padding:80px 22px 220px; 
  box-shadow:inset 0 1px 0 rgba(255,255,255,.8);
}
.nickname{
  text-align:center;
  font-size:32px;
  font-weight:700;
  letter-spacing:-.03em;
  color:#2c3b74;
}
.hp-line{
  width:72%;
  height:10px;
  border-radius:999px;
  background:#e8e8ff;
  margin:18px auto 6px;
  position:relative;
  overflow:hidden;
}
.hp-fill{
  width:100%;
  height:100%;
  border-radius:999px;
  background:linear-gradient(90deg,#87ffd9 0%, #70f0d8 45%, #7cd0ff 100%);
}
.hp-text{
  text-align:center;
  font-size:14px;
  font-weight:700;
  color:#617091;
}

.info-3{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:0;
  align-items:start;
  margin-top:34px;
  text-align:center;
}
.info-col{
  position:relative;
  padding:0 6px;
}
.info-col:not(:last-child):after{
  content:"";
  position:absolute;
  right:0;
  top:6px;
  width:1px;
  height:46px;
  background:#d8deee;
}
.info-value{
  font-size:18px;
  font-weight:600;
  letter-spacing:-.02em;
  color:#33447f;
}
.info-label{
  margin-top:4px;
  font-size:11px;
  color:#8996aa;
}
.info-icon{
  width:36px;
  height:36px;
  object-fit:contain;
  display:block;
  margin:-6px auto 4px;  /* 🔥 위로 당김 */
}

/* badge */
.appraisal-badge{
  position:absolute;
  left:8px;
  top:560px;
  width:120px;
  height:140px;
  z-index:6;
}
.badge-ring{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
  filter:drop-shadow(0 8px 14px rgba(21,18,64,.22));
}
.badge-stars{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:4px;
}
.badge-star{
  font-size:26px;
  line-height:1;
  color:#ffd36f;
  text-shadow:0 2px 6px rgba(0,0,0,.16);
  opacity:0;
  transform:scale(.5);
}
.badge-star.show{
  opacity:1;
  transform:scale(1);
  transition:all .28s cubic-bezier(.22,.61,.36,1);
}
.badge-star.red-star{
  color:#ff7ea8;
  text-shadow:0 2px 6px rgba(0,0,0,.18), 0 0 10px rgba(255,126,168,.34);
}
.badge-star.outline{
  opacity:1;
  transform:scale(1);
  color:transparent;
  -webkit-text-stroke:1.6px #ffe5b2;
  text-shadow:none;
}

/* stats */
.appraisal-panel{
  position:absolute;
  left:38px;
  right:134px;
  top:680px;
  background:rgba(255,255,255,.97);
  border-radius:14px;
  padding:18px 18px 16px;
  z-index:5;
  box-shadow:0 12px 24px rgba(20,24,58,.10);
}
.stat-row{
  margin-bottom:18px;
}
.stat-row:last-child{margin-bottom:0}
.stat-label{
  font-size:14px;
  font-weight:800;
  color:#7464d6;
  margin-bottom:8px;
}
.stat-bar{
  height:16px;
  border-radius:999px;
  background:#eceffd;
  overflow:hidden;
  position:relative;
}
.stat-fill{
  width:0%;
  height:100%;
  border-radius:999px;
  transition:width 1s cubic-bezier(.22,.61,.36,1);
  will-change:width;
  transform:translateZ(0);
}
.stat-bar.orange .stat-fill{
  background:linear-gradient(90deg,#7f87ff 0%, #6ca8ff 48%, #77f0d2 100%);
}
.stat-bar.red .stat-fill{
  background:linear-gradient(90deg,#ff7ba9 0%, #b38bff 52%, #7bd8ff 100%);
}
.segment-line{
  position:absolute;
  top:0;
  bottom:0;
  width:3px;
  background:#fff;
  opacity:.95;
}
.segment-line.one{left:33.333%}
.segment-line.two{left:66.666%}

/* character + speech */
.result-character{
  position:absolute;
  right:-8px;
  bottom:10px;
  width:200px;
  z-index:6;
  pointer-events:none;
}
.result-character img{
  width:100%;
  display:block;
  filter:drop-shadow(0 14px 18px rgba(0,0,0,.18));
}

.speech-box{
  position:absolute;
  left:14px;
  right:14px;
  bottom:14px;
  background:rgba(255,255,255,.97);
  color:#556481;
  border-radius:14px;
  padding:20px 16px;
  box-shadow:0 10px 20px rgba(18,26,60,.08);
  z-index:7;
  font-size:18px;
  line-height:1.55;
  font-weight:600;
}
.speech-box:before{
  content:"";
  position:absolute;
  top:-10px;
  left:50%;
  transform:translateX(-50%);
  border-left:10px solid transparent;
  border-right:10px solid transparent;
  border-bottom:10px solid rgba(255,255,255,.97);
}

.result-actions{
  margin-top:16px;
}
.share-preview{
  margin-top:14px;
  font-size:12px;
  color:#7e8b95;
  line-height:1.5;
}

@media (max-width:480px){
  .wrap{padding:18px 14px 72px}
  .hero h1{font-size:28px}
  .btn{font-size:14px}
  .input{font-size:16px}
}

  .info-type-value{
  margin-top:-2px;
  font-size:16px; 
  font-weight:600;
  color:#33447f;
  line-height:1.2;
}

.type-detail-box{
  margin:12px auto 0;
  width:100%;
  max-width:360px;
  text-align:center;
  padding:18px 16px;
  border-radius:18px;
  background:linear-gradient(180deg, rgba(126,122,255,.10) 0%, rgba(111,210,255,.08) 100%);
  border:1px solid rgba(112,120,255,.14);
}

.type-maincopy{
  font-size:18px;
  line-height:1.45;
  font-weight:800;
  color:#2f3f7b;
  letter-spacing:-.02em;
}

.type-playstyle{
  margin-top:8px;
  font-size:13px;
  line-height:1.5;
  font-weight:700;
  color:#7382a0;
}

  .type-detail-box{
  margin:8px auto 0;
}

  .capture-ios{
  width:390px !important;
  max-width:390px !important;
  min-width:390px !important;
  margin:0 auto !important;
}
  
</style>
</head>
<body>

<div class="wrap">
  <section class="hero">
    <h1>Trainer Test</h1>
    <p>레벨과 닉네임을 입력하고 테스트를 진행해 주세요.</p>
  </section>

  <section class="card" id="introSection">
    <label class="label" for="trainerLevel">트레이너 레벨 (1~80)</label>
    <input
      class="input"
      type="text"
      id="trainerLevel"
      inputmode="numeric"
      maxlength="2"
      placeholder="1 - 80"
      autocomplete="off"
    >

    <label class="label" for="nickname">닉네임 (글로벌 톡방의 한글 닉네임)</label>
    <input class="input" type="text" id="nickname" placeholder="한글 닉네임 입력" autocomplete="off">
    <div class="helper">한글만 입력되며 공백은 자동 제거됩니다.</div>

    <div class="btn-row">
      <button class="btn btn-primary" type="button" id="startBtn">테스트 시작하기</button>
    </div>
  </section>

  <section class="hidden" id="quizSection">
    <div class="card">
      <div class="progress-box">
        <div class="progress-meta">
          <span id="pageRangeText">1 - 3 / 15</span>
          <span id="pageStepText">1 / 5</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <div class="question-page-head">
        <strong>테스트 진행 중</strong>
        <p>각 페이지마다 3문항씩 표시됩니다.</p>
      </div>

      <form id="quizForm">
        <div id="questionArea"></div>

        <div class="btn-row">
          <button class="btn btn-secondary" type="button" id="prevBtn">이전</button>
          <button class="btn btn-primary" type="button" id="nextBtn">다음</button>
          <button class="btn btn-primary hidden" type="submit" id="submitBtn">결과 보기</button>
        </div>
      </form>
    </div>
  </section>

  <section id="resultSection" class="hidden">
    <div class="result-screen" id="captureTarget">
      <div class="result-top">
        <div class="lv-text">
          <span class="lv-prefix">Trainer Lv.</span>
          <span id="resultLevel">15</span>
        </div>

        <svg class="arc" viewBox="0 0 500 210" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M50 190 Q250 20 450 190" stroke="rgba(255,255,255,.92)" stroke-width="4" stroke-linecap="round"/>
        </svg>

        <div class="pogo-wrap">
          <img id="resultPogo" src="" alt="pogo character">
        </div>
      </div>

      <div class="result-card">
        <div class="nickname" id="resultNickname">닉네임</div>

        <div class="hp-line"><div class="hp-fill"></div></div>
        <div class="hp-text" id="resultHpText">121 / 121 HP</div>

<div class="info-3">
  <div class="info-col">
    <div class="info-value" id="resultWeight">9.57kg</div>
    <div class="info-label">참여 시간</div>
  </div>

  <div class="info-col">
    <img class="info-icon" id="resultIcon" src="" alt="icon">
    <div class="info-value info-type-value" id="resultType">풀</div>
    <div class="info-label"></div>
  </div>

  <div class="info-col">
    <div class="info-value" id="resultHeight">26.320m</div>
    <div class="info-label">참여 날짜</div>
  </div>
</div>

<div class="type-detail-box">
  <div class="type-maincopy" id="resultMainCopy">꾸준함으로 승리를 만드는 트레이너</div>
  <div class="type-playstyle" id="resultPlayStyle">서포트 / 장기전 / 안정 운영</div>
</div>
</div>

<div class="appraisal-badge">
        <img src="./images/badge-ring.png" class="badge-ring" alt="badge ring">
        <div class="badge-stars" id="badgeStars">
          <span class="badge-star">★</span>

function shuffleArray(arr) {
  const copy = [...arr];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function getProfileLetters() {

    J: 0, P: 0
  };

  profileQuestionNos.forEach((qNo) => {
    const answer = answers[qNo];
    if (!answer) return;

    if (qNo === 16) {
      if (answer === 1) score.E++;
      if (answer === 2) score.I++;
      if (answer === 3) score.T++;
      if (answer === 4) score.F++;
    }

    if (qNo === 17) {
      if (answer === 1) { score.S++; score.T++; }
      if (answer === 2) { score.N++; score.I++; }
      if (answer === 3) { score.F++; score.N++; }
      if (answer === 4) { score.F++; score.N++; }
    }

    if (qNo === 18) {
      if (answer === 1) { score.J++; score.T++; }
      if (answer === 2) { score.P++; score.S++; }
      if (answer === 3) { score.E++; score.T++; }
      if (answer === 4) { score.P++; score.F++; }
    }

    if (qNo === 19) {
      if (answer === 1) { score.T++; }
      if (answer === 2) { score.J++; }
      if (answer === 3) { score.F++; }
      if (answer === 4) { score.P++; }
    }

    if (qNo === 20) {
      if (answer === 1) { score.T++; }
      if (answer === 2) { score.J++; }
      if (answer === 3) { score.F++; }
      if (answer === 4) { score.P++; score.N++; }
    }
  });

  const EI = score.E >= score.I ? 'E' : 'I';
  const SN = score.S >= score.N ? 'S' : 'N';
  const TF = score.T >= score.F ? 'T' : 'F';
  const JP = score.J >= score.P ? 'J' : 'P';

  return `${EI}${SN}${TF}${JP}`;
}

function getProfileByLetters(letters) {
  const mappedKey = (() => {
    if (letters === 'ESTJ') return 'ESTJ';
    if (letters === 'ISTJ') return 'ISTJ';
    if (letters === 'ENTJ') return 'ENTJ';
    if (letters === 'ENTP') return 'ENTP';
    if (letters === 'ESTP') return 'ESTP';
    if (letters === 'ISFJ') return 'ISFJ';
    if (letters === 'ESFJ') return 'ESFJ';
    if (letters === 'ENFJ') return 'ENFJ';
    if (letters === 'INTP') return 'INTP';
    if (letters === 'ESFP') return 'ESFP';
    if (letters === 'ISFP') return 'ISFP';
    if (letters === 'INTJ') return 'INTJ';
    if (letters === 'ISTP') return 'ISTP';
    if (letters === 'INFJ') return 'ENTJ_ALT';
    if (letters === 'INFP') return 'INFP';
    if (letters === 'ENFP') return 'ENFP';
    return 'ESTJ';
  })();

  const profile = typeProfiles[mappedKey];

  return {
    ...profile,
    letters
  };
}

function getProfileAssets(profile) {
  const iconNumber = profile.icon.replace('icon-', '');
  const pogoNumber = profile.pogo.replace('pogo-', '');

  return {
    pogo: `./images/pogo-${pogoNumber}.png`,
    icon: `./images/icon-${iconNumber}.png`,
    advisor: `./images/advisor-1.png`
  };
}

const SHARE_IMAGE_BASE_URL = `${window.location.origin}/images`;

function getShareImageUrl(profile) {
  const imageNumber = profile.icon.replace('icon-', '');
  return `${SHARE_IMAGE_BASE_URL}/${imageNumber}.png`;
}
  
function renderCurrentPage() {
  const start = currentPage * QUESTIONS_PER_PAGE;
  const end = start + QUESTIONS_PER_PAGE;
  const pageQuestions = shuffledQuestions.slice(start, end);

pageRangeText.textContent = `${start + 1} - ${Math.min(end, questionBank.length)} / ${questionBank.length}`;
pageStepText.textContent = `${currentPage + 1} / ${TOTAL_PAGES}`;
  progressFill.style.width = `${((currentPage + 1) / TOTAL_PAGES) * 100}%`;

  questionArea.innerHTML = pageQuestions.map((item, idx) => {
    const absoluteIndex = start + idx;
    return `
      <div class="question-card">
        <div class="q-top">
          <div class="q-badge">Q${absoluteIndex + 1}</div>
        </div>
        <h3 class="q-title">${item.question}</h3>
        <div class="options">
          ${item.options.map((optionText, optionIndex) => `
            <label class="option">
              <input
                type="radio"
                name="q-${item.no}"
                value="${optionIndex + 1}"
                ${answers[item.no] === (optionIndex + 1) ? 'checked' : ''}
              >
              <span>${optionText}</span>
            </label>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');

  prevBtn.disabled = currentPage === 0;
  if (currentPage === TOTAL_PAGES - 1) {
    nextBtn.classList.add('hidden');
    submitBtn.classList.remove('hidden');
  } else {
    nextBtn.classList.remove('hidden');
    submitBtn.classList.add('hidden');
  }
}

function saveCurrentPageAnswers() {
  const start = currentPage * QUESTIONS_PER_PAGE;
  const end = start + QUESTIONS_PER_PAGE;
  const pageQuestions = shuffledQuestions.slice(start, end);

  pageQuestions.forEach((q) => {
    const checked = quizForm.querySelector(`input[name="q-${q.no}"]:checked`);
    if (checked) answers[q.no] = Number(checked.value);
  });
}

function pageAnsweredCount() {
  const start = currentPage * QUESTIONS_PER_PAGE;
  const end = start + QUESTIONS_PER_PAGE;
  const pageQuestions = shuffledQuestions.slice(start, end);
  let count = 0;
  pageQuestions.forEach((q) => {
    if (quizForm.querySelector(`input[name="q-${q.no}"]:checked`) || answers[q.no]) count++;
  });
  return count;
}

document.getElementById('startBtn').addEventListener('click', () => {
  if (!validateTrainerLevel()) return;
  if (!validateNickname()) return;

  setCurrentDateTime();
  shuffledQuestions = shuffleArray(questionBank);
  answers = {};
  currentPage = 0;

  showQuiz();
  renderCurrentPage();
  window.scrollTo({ top:0, behavior:'smooth' });
});

prevBtn.addEventListener('click', () => {
  saveCurrentPageAnswers();
  if (currentPage > 0) {
    currentPage--;
    renderCurrentPage();
    window.scrollTo({ top:0, behavior:'smooth' });
  }
});

nextBtn.addEventListener('click', () => {
  saveCurrentPageAnswers();
  if (pageAnsweredCount() < QUESTIONS_PER_PAGE) {
    alert('현재 페이지의 3문항을 모두 선택해 주세요.');
    return;
  }
  if (currentPage < TOTAL_PAGES - 1) {
    currentPage++;
    renderCurrentPage();
    window.scrollTo({ top:0, behavior:'smooth' });
  }
});

function countGroupCorrect(groupName) {
  return shuffledQuestions
    .filter(q => q.group === groupName)
    .reduce((sum, q) => sum + (answers[q.no] === q.correct ? 1 : 0), 0);
}

function getTotalCorrect() {
  return shuffledQuestions
    .filter(q => q.group === 'host' || q.group === 'participant' || q.group === 'chat')
    .reduce((sum, q) => sum + (answers[q.no] === q.correct ? 1 : 0), 0);
}

function statCountToPercent(correctCount) {
  switch (correctCount) {
    case 0: return 0;
    case 1: return 16.6667;
    case 2: return 33.3333;
    case 3: return 66.6667;
    case 4: return 83.3333;
    case 5: return 100;
    default: return 0;
  }
}

function getStarData(totalCorrect) {
  if (totalCorrect === 15) return { stars: 3, theme: 'red', redStars: true };
  if (totalCorrect >= 12) return { stars: 3, theme: 'orange', redStars: false };
  if (totalCorrect >= 9) return { stars: 2, theme: 'orange', redStars: false };
  if (totalCorrect >= 6) return { stars: 1, theme: 'orange', redStars: false };
  return { stars: 0, theme: 'orange', redStars: false };
}

function getSpeech(totalCorrect) {
  if (totalCorrect === 15) return '완벽합니다. 이 트레이너는 모든 가이드 흐름과 채팅 규칙을 정확히 이해하고 있습니다.';
  if (totalCorrect >= 12) return '아주 좋습니다. 이 트레이너는 전체 흐름을 안정적으로 이해하고 있습니다.';
  if (totalCorrect >= 9) return '좋습니다. 핵심 흐름은 잘 잡았고, 조금만 더 익히면 더욱 좋아집니다.';
  if (totalCorrect >= 6) return '기본 이해는 되어 있습니다. 가이드를 한 번 더 읽으면 훨씬 수월해질 거예요.';
  return '먼저 기본 가이드와 채팅 규칙부터 다시 확인하는 것을 추천합니다.';
}

function animateLevelUp(targetLevel) {
  const el = document.getElementById('resultLevel');
  const startLevel = 15;
  const endLevel = Number(targetLevel);

  if (!el || Number.isNaN(endLevel)) return;

  if (endLevel <= startLevel) {
    el.textContent = endLevel;
    return;
  }

  const duration = 900;
  const startTime = performance.now();

  function tick(now) {
    const progress = Math.min((now - startTime) / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    const current = Math.round(startLevel + (endLevel - startLevel) * eased);

    el.textContent = current;

    if (progress < 1) {
      requestAnimationFrame(tick);
    } else {
      el.textContent = endLevel;
    }
  }

  el.textContent = startLevel;
  requestAnimationFrame(tick);
}

function animateStatBars(hostPercent, participantPercent, chatPercent) {
  const hostFill = document.getElementById('hostFill');
  const participantFill = document.getElementById('participantFill');
  const chatFill = document.getElementById('chatFill');

  [hostFill, participantFill, chatFill].forEach(el => {
    el.style.transition = 'none';
    el.style.width = '0%';
    void el.offsetWidth;
  });

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      hostFill.style.transition = 'width 1s cubic-bezier(.22,.61,.36,1)';
      participantFill.style.transition = 'width 1s cubic-bezier(.22,.61,.36,1)';
      chatFill.style.transition = 'width 1s cubic-bezier(.22,.61,.36,1)';

      hostFill.style.width = `${hostPercent}%`;
      participantFill.style.width = `${participantPercent}%`;
      chatFill.style.width = `${chatPercent}%`;
    });
  });
}

let currentRendered = null;

quizForm.addEventListener('submit', (e) => {
  e.preventDefault();

  saveCurrentPageAnswers();

if (Object.keys(answers).length < questionBank.length) {
  alert('모든 문항에 답변해 주세요.');
  return;
}

  const hostCorrect = countGroupCorrect('host');
  const participantCorrect = countGroupCorrect('participant');
  const chatCorrect = countGroupCorrect('chat');
  const totalCorrect = getTotalCorrect();

  const hostPercent = statCountToPercent(hostCorrect);
  const participantPercent = statCountToPercent(participantCorrect);
  const chatPercent = statCountToPercent(chatCorrect);

const starData = getStarData(totalCorrect);
const profileLetters = getProfileLetters();
const profileResult = getProfileByLetters(profileLetters);
const assets = getProfileAssets(profileResult);
const shareImageUrl = getShareImageUrl(profileResult);
const randomHp = getRandomHp();

currentRendered = {
  hostCorrect, participantCorrect, chatCorrect, totalCorrect,
  hostPercent, participantPercent, chatPercent,
  starData, assets, shareImageUrl, randomHp, profileResult
};
  
document.getElementById('resultLevel').textContent = '15';
document.getElementById('resultNickname').textContent = nickname.value;
document.getElementById('resultWeight').textContent = formatWeightFromTime(currentTime);
document.getElementById('resultHeight').textContent = formatHeightFromDate(currentDate);
document.getElementById('resultHpText').textContent = `${randomHp} / ${randomHp} HP`;

document.getElementById('resultType').textContent = profileResult.type;
document.getElementById('resultMainCopy').textContent = profileResult.mainCopy;
document.getElementById('resultPlayStyle').textContent = profileResult.playStyle;

document.getElementById('resultPogo').src = assets.pogo;
document.getElementById('resultIcon').src = assets.icon;
document.getElementById('resultCharacter').src = assets.advisor;

  document.getElementById('speechText').textContent = getSpeech(totalCorrect);

  document.getElementById('hostBar').className = `stat-bar ${starData.theme}`;
  document.getElementById('participantBar').className = `stat-bar ${starData.theme}`;
  document.getElementById('chatBar').className = `stat-bar ${starData.theme}`;

  const badgeStars = document.querySelectorAll('.badge-star');
  badgeStars.forEach(star => {
    star.classList.remove('show', 'red-star', 'outline');
  });

  showResult();
  window.scrollTo({ top:0, behavior:'smooth' });

  setTimeout(() => {
    animateStatBars(hostPercent, participantPercent, chatPercent);
  }, 140);

  setTimeout(() => {
    if (starData.stars === 0) {
      badgeStars.forEach(star => {
        star.classList.add('outline');
      });
    } else {
      for (let i = 0; i < badgeStars.length; i++) {
        if (i < starData.stars) {
          setTimeout(() => {
            badgeStars[i].classList.add('show');
            if (starData.redStars) {
              badgeStars[i].classList.add('red-star');
            }
          }, i * 180);
        } else {
          badgeStars[i].classList.add('outline');
        }
      }
    }
  }, 420);

  setTimeout(() => {
    animateLevelUp(trainerLevel.value);
  }, 760);
});

document.getElementById('retryBtn').addEventListener('click', () => {
  answers = {};
  currentPage = 0;
  trainerLevel.value = '';
  nickname.value = '';
  document.getElementById('resultLevel').textContent = '15';
  showIntro();
  window.scrollTo({ top:0, behavior:'smooth' });
});

async function makeShareImageDataUrl() {
  const target = document.getElementById('captureTarget');

  target.classList.add('capture-ios');

  await new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));

  const canvas = await html2canvas(target, {
    useCORS: true,
    backgroundColor: null,
    scale: 3,
    width: 390,
    windowWidth: 390
  });

  target.classList.remove('capture-ios');

  return canvas.toDataURL('image/png');
}

document.getElementById('downloadBtn').addEventListener('click', async () => {
  const dataUrl = await makeShareImageDataUrl();
  const a = document.createElement('a');
  a.href = dataUrl;
  a.download = `trainer-result-${Date.now()}.png`;
  a.click();
});
