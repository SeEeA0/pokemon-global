<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Pokémon GO Global | 내타입 포켓몬 확인하기</title>
<link rel="icon" href="/images/favicon.png" />

<meta name="description" content="Trainer Test" />
<meta property="og:title" content="Pokémon GO Global | Trainer Test" />
<meta property="og:description" content="나와 같은타입의 포켓몬을 확인해보세요." />
<meta property="og:image" content="https://pokemon-global.pages.dev/og2.jpg" />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://pokemon-global.pages.dev/" />

<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0}
:root{
  --bg:#eef2f8;
  --bg-soft:#f6f8fc;
  --card:#ffffff;
  --text:#243746;
  --text-soft:#6f7f90;
  --line:#dde5ee;

  --primary-1:#8e7dff;
  --primary-2:#5f69ff;
  --primary-3:#3a48be;

  --space-1:#131a46;
  --space-2:#1d2b6d;
  --space-3:#3a3f96;
  --space-4:#6c58c8;
  --space-5:#9f83e8;

  --mint:#78f0d0;
  --mint-soft:#dbfff4;

  --shadow-soft:0 12px 30px rgba(22,31,63,.08);
  --shadow-card:0 20px 40px rgba(18,26,60,.10);
  --shadow-cta:0 14px 28px rgba(83,92,222,.28);

  --radius-card:24px;
  --radius-soft:18px;
  --radius-pill:999px;

  --ease:cubic-bezier(.22,.61,.36,1);
}

body{
  font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top, rgba(160,170,255,.16), transparent 26%),
    linear-gradient(180deg,#eef2f8 0%, #edf1f7 100%);
  -webkit-text-size-adjust:100%;
}
.hidden{display:none!important}

.wrap{
  max-width:560px;
  margin:0 auto;
  padding:22px 16px 80px;
}

.card{
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.7);
  border-radius:var(--radius-card);
  box-shadow:var(--shadow-soft);
  padding:22px;
  margin-bottom:16px;
}

.hero{
  position:relative;
  overflow:hidden;
  padding:28px 22px 24px;
  border-radius:28px;
  background:
    radial-gradient(circle at 50% 0%, rgba(255,255,255,.20), transparent 28%),
    radial-gradient(circle at 84% 18%, rgba(163,132,255,.36), transparent 22%),
    radial-gradient(circle at 14% 22%, rgba(107,164,255,.16), transparent 18%),
    linear-gradient(180deg,#121842 0%, #1c2a6b 38%, #3d4299 68%, #7459d2 100%);
  color:#fff;
  box-shadow:0 16px 34px rgba(21,29,72,.22);
  margin-bottom:16px;
}
.hero:before{
  content:"";
  position:absolute;
  inset:-40% auto auto -10%;
  width:220px;
  height:220px;
  background:radial-gradient(circle, rgba(255,255,255,.10), transparent 68%);
  pointer-events:none;
}
.hero:after{
  content:"";
  position:absolute;
  right:18px;
  top:18px;
  width:84px;
  height:84px;
  border-radius:50%;
  background:
    radial-gradient(circle at 35% 35%, rgba(255,255,255,.85) 0 2px, transparent 3px),
    radial-gradient(circle at 68% 22%, rgba(255,255,255,.5) 0 1.5px, transparent 2.5px),
    radial-gradient(circle at 72% 62%, rgba(255,255,255,.35) 0 1.5px, transparent 2.5px),
    radial-gradient(circle at 28% 74%, rgba(255,255,255,.4) 0 1.5px, transparent 2.5px),
    radial-gradient(circle, rgba(255,255,255,.12), transparent 72%);
  opacity:.9;
  pointer-events:none;
}
.hero h1{
  position:relative;
  margin:0 0 8px;
  font-size:30px;
  line-height:1.18;
  letter-spacing:-.03em;
  font-weight:800;
}
.hero p{
  position:relative;
  margin:0;
  opacity:.92;
  font-size:14px;
  line-height:1.55;
}

.label{
  display:block;
  margin:14px 0 8px;
  font-size:14px;
  font-weight:800;
  color:#1e2e4e;
}
.input{
  width:100%;
  height:54px;
  border-radius:15px;
  border:1px solid #d7e0ee;
  background:#fbfcff;
  padding:0 16px;
  font-size:16px;
  outline:none;
  color:#22364b;
  transition:border-color .2s ease, box-shadow .2s ease, background .2s ease;
  -webkit-appearance:none;
  appearance:none;
  transform:translateZ(0);
}
.input::placeholder{
  color:#9aa7b6;
}
.input:focus{
  border-color:#7d84ff;
  background:#fff;
  box-shadow:0 0 0 4px rgba(114,122,255,.12);
}
.input-error{
  border-color:#ff6b7f!important;
  box-shadow:0 0 0 4px rgba(255,107,127,.12)!important;
}
.helper{
  margin-top:8px;
  color:#7a8792;
  font-size:12px;
  line-height:1.5;
}

.btn-row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:18px;
}
.btn{
  appearance:none;
  border:0;
  cursor:pointer;
  min-height:52px;
  padding:0 18px;
  border-radius:15px;
  font-size:15px;
  font-weight:800;
  transition:transform .18s var(--ease), box-shadow .18s var(--ease), opacity .18s ease, background .18s ease;
}
.btn:hover{
  transform:translateY(-1px);
}
.btn:active{
  transform:translateY(0);
}
.btn-primary{
  color:#fff;
  background:
    linear-gradient(135deg, rgba(255,255,255,.18), rgba(255,255,255,0) 34%),
    linear-gradient(135deg,#7b78ff 0%, #5b66ff 42%, #3e4dc8 100%);
  box-shadow:var(--shadow-cta);
}
.btn-secondary{
  background:#edf2fb;
  color:#25365c;
  box-shadow:0 8px 18px rgba(44,58,119,.08);
}
.btn:disabled{
  opacity:.45;
  cursor:not-allowed;
  transform:none;
}

.progress-box{
  margin-bottom:16px;
}
.progress-meta{
  display:flex;
  justify-content:space-between;
  margin-bottom:8px;
  font-size:13px;
  color:#647482;
  font-weight:700;
}
.progress-bar{
  height:8px;
  border-radius:999px;
  background:#e8edf5;
  overflow:hidden;
}
.progress-fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#8d85ff 0%, #72dfff 55%, #7ef0cb 100%);
  transition:width .35s ease;
}

.question-page-head{
  margin-bottom:12px;
}
.question-page-head strong{
  display:block;
  font-size:18px;
  margin-bottom:6px;
  color:#1c2b4c;
}
.question-page-head p{
  margin:0;
  color:#7a8792;
  font-size:13px;
}

.question-card{
  background:linear-gradient(180deg,#ffffff 0%, #fbfcff 100%);
  border:1px solid #edf1f7;
  border-radius:20px;
  box-shadow:0 10px 24px rgba(31,42,68,.05);
  padding:14px;
  margin-bottom:12px;
}
.q-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  margin-bottom:8px;
}
.q-badge{
  min-width:44px;
  padding:6px 12px;
  border-radius:999px;
  background:linear-gradient(135deg,#eef2ff 0%, #edf7ff 100%);
  color:#4957b8;
  font-size:12px;
  font-weight:900;
  border:1px solid #dde5ff;
  text-align:center;
}
.q-title{
  font-size:15px;
  font-weight:800;
  margin:0 0 14px;
  line-height:1.45;
  color:#213351;
  letter-spacing:-.01em;
}

.scale-text-row{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:6px;
  margin-bottom:10px;
}
.scale-text-row div{
  font-size:10px;
  line-height:1.25;
  color:#7b88a0;
  font-weight:800;
  text-align:center;
  letter-spacing:-.02em;
}
.scale-text-row div:nth-child(1),
.scale-text-row div:nth-child(5){
  font-size:9px;
}

.options{
  position:relative;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  align-items:center;
  gap:0;
  padding:8px 0 2px;
  user-select:none;
  -webkit-user-select:none;
  touch-action:none;
}
.scale-track{
  position:absolute;
  left:12%;
  right:12%;
  top:50%;
  height:6px;
  transform:translateY(-50%);
  border-radius:999px;
  background:linear-gradient(90deg,#e3e9f6 0%, #dfe6f4 100%);
  z-index:0;
}
.scale-track-fill{
  position:absolute;
  left:12%;
  width:0%;
  top:50%;
  height:6px;
  transform:translateY(-50%);
  border-radius:999px;
  background:linear-gradient(90deg,#8d85ff 0%, #72dfff 55%, #7ef0cb 100%);
  z-index:1;
  transition:width .22s ease;
}
.circle{
  position:relative;
  z-index:2;
  width:42px;
  height:42px;
  margin:0 auto;
  border-radius:50%;
  border:2px solid #dbe3f0;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  font-weight:900;
  color:#61718b;
  cursor:pointer;
  transition:transform .18s ease, border-color .18s ease, box-shadow .18s ease, background .18s ease, color .18s ease;
  box-shadow:0 4px 10px rgba(21,31,63,.04);
}
.circle:hover{
  transform:translateY(-1px);
  border-color:#bfcaff;
}
.circle.active{
  background:linear-gradient(135deg,#7b78ff 0%, #5b66ff 42%, #3e4dc8 100%);
  border-color:transparent;
  color:#fff;
  box-shadow:0 10px 18px rgba(83,92,222,.24);
}
.circle span{
  pointer-events:none;
}

.divider,
.item-grid{
  display:none;
}

.result-screen{
  position:relative;
  overflow:hidden;
  min-height:980px;
  border-radius:32px;
  background:
    radial-gradient(circle at 50% 10%, rgba(255,255,255,.16), transparent 18%),
    radial-gradient(circle at 18% 18%, rgba(129,161,255,.22), transparent 18%),
    radial-gradient(circle at 82% 16%, rgba(178,128,255,.22), transparent 18%),
    linear-gradient(180deg,#121842 0%, #1d2b6c 34%, #3a3f96 67%, #6d58c8 100%);
  color:#fff;
  box-shadow:0 18px 36px rgba(20,28,73,.24);
}
.result-screen:before{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 12% 20%, rgba(255,255,255,.9) 0 1.2px, transparent 1.8px),
    radial-gradient(circle at 22% 10%, rgba(255,255,255,.6) 0 1px, transparent 1.6px),
    radial-gradient(circle at 38% 14%, rgba(255,255,255,.85) 0 1.3px, transparent 1.8px),
    radial-gradient(circle at 61% 8%, rgba(255,255,255,.65) 0 1px, transparent 1.6px),
    radial-gradient(circle at 78% 18%, rgba(255,255,255,.8) 0 1.2px, transparent 1.8px),
    radial-gradient(circle at 88% 9%, rgba(255,255,255,.55) 0 1px, transparent 1.6px),
    radial-gradient(circle at 72% 28%, rgba(255,255,255,.55) 0 1px, transparent 1.5px);
  opacity:.55;
  pointer-events:none;
}
.result-top{
  position:relative;
  padding:4px 18px 0;
  min-height:220px;
  z-index:1;
}

.lv-text{
  display:flex;
  align-items:flex-end;
  justify-content:center;
  gap:8px;
  text-align:center;
  margin-top:16px;
  min-height:52px;
  color:#fff;
}
.lv-prefix{
  font-size:18px;
  line-height:1;
  font-weight:300;
  opacity:.92;
  letter-spacing:-.01em;
  transform:translateY(-4px);
}
#resultLevel{
  display:inline-block;
  min-width:2ch;
  font-size:48px;
  line-height:1;
  font-weight:300;
  letter-spacing:-.04em;
}

.arc{
  width:100%;
  max-width:430px;
  margin:8px auto 0;
  display:block;
}

.pogo-wrap{
  position:absolute;
  left:50%;
  top:110px;
  transform:translateX(-50%);
  width:220px;
  z-index:3;
}
.pogo-wrap img{
  width:100%;
  display:block;
  filter:none;
}

.result-card{
  position:relative;
  margin:10px 14px 0;
  background:linear-gradient(180deg,#f9fbff 0%, #f3f7fe 100%);
  border-radius:26px 26px 0 0;
  min-height:700px;
  color:#3c6670;
  padding:80px 22px 220px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.8);
}
.nickname{
  text-align:center;
  font-size:32px;
  font-weight:700;
  letter-spacing:-.03em;
  color:#2c3b74;
}
.hp-line{
  width:72%;
  height:10px;
  border-radius:999px;
  background:#e8e8ff;
  margin:18px auto 6px;
  position:relative;
  overflow:hidden;
}
.hp-fill{
  width:100%;
  height:100%;
  border-radius:999px;
  background:linear-gradient(90deg,#87ffd9 0%, #70f0d8 45%, #7cd0ff 100%);
}
.hp-text{
  text-align:center;
  font-size:14px;
  font-weight:700;
  color:#617091;
}

.info-3{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:0;
  align-items:start;
  margin-top:20px;
  text-align:center;
}
.info-col{
  position:relative;
  padding:0 6px;
}
.info-col:not(:last-child):after{
  content:"";
  position:absolute;
  right:0;
  top:6px;
  width:1px;
  height:46px;
  background:#d8deee;
}
.info-value{
  font-size:18px;
  font-weight:600;
  letter-spacing:-.02em;
  color:#33447f;
  white-space:nowrap;
}
.info-label{
  margin-top:10px;
  font-size:13px;
  color:#8996aa;
  font-weight:600;
  letter-spacing:-0.01em;
}
  
.info-icon{
  width:36px;
  height:36px;
  object-fit:contain;
  display:block;
  margin:-6px auto 4px;
}

.appraisal-badge{
  position:absolute;
  left:8px;
  top:560px;
  width:120px;
  height:140px;
  z-index:6;
}
.badge-ring{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
  filter:drop-shadow(0 8px 14px rgba(21,18,64,.22));
}
.badge-stars{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:4px;
}
.badge-star{
  font-size:26px;
  line-height:1;
  color:#ffd36f;
  text-shadow:0 2px 6px rgba(0,0,0,.16);
  opacity:0;
  transform:scale(.5);
}
.badge-star.show{
  opacity:1;
  transform:scale(1);
  transition:all .28s cubic-bezier(.22,.61,.36,1);
}
.badge-star.red-star{
  color:#ff7ea8;
  text-shadow:0 2px 6px rgba(0,0,0,.18), 0 0 10px rgba(255,126,168,.34);
}
.badge-star.outline{
  opacity:1;
  transform:scale(1);
  color:transparent;
  -webkit-text-stroke:1.6px #ffe5b2;
  text-shadow:none;
}

.appraisal-panel{
  position:absolute;
  left:38px;
  right:134px;
  top:650px;
  background:rgba(255,255,255,.97);
  border-radius:14px;
  padding:18px 18px 16px;
  z-index:5;
  box-shadow:0 12px 24px rgba(20,24,58,.10);
}
.stat-row{
  margin-bottom:18px;
}
.stat-row:last-child{margin-bottom:0}
.stat-label{
  font-size:14px;
  font-weight:800;
  color:#7464d6;
  margin-bottom:8px;
}
.stat-bar{
  height:16px;
  border-radius:999px;
  background:#eceffd;
  overflow:hidden;
  position:relative;
}
.stat-fill{
  width:0%;
  height:100%;
  border-radius:999px;
  transition:width 1s cubic-bezier(.22,.61,.36,1);
  will-change:width;
  transform:translateZ(0);
}
.stat-bar.orange .stat-fill{
  background:linear-gradient(90deg,#7f87ff 0%, #6ca8ff 48%, #77f0d2 100%);
}
.stat-bar.red .stat-fill{
  background:linear-gradient(90deg,#ff7ba9 0%, #b38bff 52%, #7bd8ff 100%);
}
.segment-line{
  position:absolute;
  top:0;
  bottom:0;
  width:3px;
  background:#fff;
  opacity:.95;
}
.segment-line.one{left:33.333%}
.segment-line.two{left:66.666%}

.result-character{
  position:absolute;
  right:-8px;
  bottom:10px;
  width:200px;
  z-index:6;
  pointer-events:none;
}
.result-character img{
  width:100%;
  display:block;
  filter:drop-shadow(0 14px 18px rgba(0,0,0,.18));
}

.speech-box{
  position:absolute;
  left:14px;
  right:14px;
  bottom:14px;
  background:rgba(255,255,255,.97);
  color:#556481;
  border-radius:14px;
  padding:20px 16px;
  box-shadow:0 10px 20px rgba(18,26,60,.08);
  z-index:7;
  font-size:18px;
  line-height:1.55;
  font-weight:600;
  white-space:pre-line;
}
.speech-box:before{
  content:"";
  position:absolute;
  top:-10px;
  left:50%;
  transform:translateX(-50%);
  border-left:10px solid transparent;
  border-right:10px solid transparent;
  border-bottom:10px solid rgba(255,255,255,.97);
}

.result-actions{
  margin-top:16px;
}
.share-preview{
  margin-top:14px;
  font-size:12px;
  color:#7e8b95;
  line-height:1.5;
}

#analyzingOverlay{
  position:absolute;
  inset:0;
  z-index:50;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(18,24,66,.28);
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  border-radius:32px;
}
.analyzing-box{
  min-width:220px;
  padding:22px 20px;
  border-radius:20px;
  background:rgba(255,255,255,.96);
  box-shadow:0 18px 34px rgba(17,24,58,.16);
  text-align:center;
}
.analyzing-spinner{
  width:34px;
  height:34px;
  margin:0 auto 12px;
  border-radius:50%;
  border:3px solid #dfe5ff;
  border-top-color:#6e78ff;
  animation:spinAnalyzing .9s linear infinite;
}
.analyzing-text{
  font-size:15px;
  font-weight:800;
  color:#44557d;
  letter-spacing:-.01em;
}
@keyframes spinAnalyzing{
  to{ transform:rotate(360deg); }
}

@media (max-width:480px){
  .wrap{padding:18px 14px 72px}
  .hero h1{font-size:28px}
  .btn{font-size:14px}
  .input{font-size:16px}
  .q-title{font-size:14px}
  .circle{
    width:40px;
    height:40px;
    font-size:12px;
  }
  .scale-text-row div{
    font-size:9px;
  }
}

.info-type-value{
  margin:24px auto 0;
  font-size:16px;
  font-weight:600;
  color:#33447f;
  line-height:1.2;
}

.type-detail-box{
  margin:8px auto 0;
  width:100%;
  max-width:360px;
  text-align:center;
  padding:18px 16px;
  border-radius:18px;
  background:linear-gradient(180deg, rgba(126,122,255,.10) 0%, rgba(111,210,255,.08) 100%);
  border:1px solid rgba(112,120,255,.14);
}
.type-maincopy{
  font-size:18px;
  line-height:1.45;
  font-weight:800;
  color:#2f3f7b;
  letter-spacing:-.02em;
}
.type-playstyle{
  margin-top:8px;
  font-size:13px;
  line-height:1.5;
  font-weight:700;
  color:#7382a0;
}

.capture-fix .appraisal-badge,
.capture-fix .badge-ring,
.capture-fix .badge-stars,
.capture-fix .badge-star{
  transform: none !important;
  filter: none !important;
  text-shadow: none !important;
  will-change: auto !important;
}

.capture-fix .badge-star{
  font-size: 22px !important;
}
</style>
</head>
<body>

<div class="wrap">
  <section class="hero">
    <h1>Pokémon GO Global 🌏</h1>
    <p>만들다가 세아잡겠네</p>
  </section>

  <section class="card" id="introSection">
    <label class="label" for="trainerLevel">트레이너 레벨 (1~80)</label>
    <input
      class="input"
      type="text"
      id="trainerLevel"
      inputmode="numeric"
      maxlength="2"
      placeholder="1 - 80"
      autocomplete="off"
    >

    <label class="label" for="nickname">닉네임 (글로벌 톡방의 한글 닉네임)</label>
    <input class="input" type="text" id="nickname" placeholder="한글 닉네임 입력" autocomplete="off">
    <div class="helper">한글만 입력되며 공백은 자동 제거됩니다.</div>

    <div class="btn-row">
      <button class="btn btn-primary" type="button" id="startBtn">테스트 시작하기</button>

  const v = Number(trainerLevel.value);
  if (!Number.isInteger(v) || v < 1 || v > 80) {
    alert('트레이너 레벨은 1부터 80까지만 입력 가능합니다.');
    trainerLevel.focus();
    return false;
  }
  return true;
}

  const end = start + QUESTIONS_PER_PAGE;
  const pageQuestions = shuffledQuestions.slice(start, end);

  pageRangeText.textContent = `${start + 1} - ${Math.min(end, questionBank.length)} / ${questionBank.length}`;
  pageStepText.textContent = `${currentPage + 1} / ${TOTAL_PAGES}`;
  progressFill.style.width = `${((currentPage + 1) / TOTAL_PAGES) * 100}%`;

  questionArea.innerHTML = pageQuestions.map((item, idx) => {
    const absoluteIndex = start + idx;
    const savedValue = answers[item.no] || 0;
    return `
      <div class="question-card">
        <div class="q-top">
          <div class="q-badge">${String(absoluteIndex + 1).padStart(2, '0')}</div>
        </div>
        <h3 class="q-title">${item.question}</h3>

        <div class="scale-text-row">
          ${SCALE_LABELS.map(label => `<div>${label}</div>`).join('')}
        </div>

        <div class="options scale-circle" data-q="${item.no}" data-value="${savedValue}">
          <div class="scale-track"></div>
          <div class="scale-track-fill" style="width:${getTrackFillPercent(savedValue)}%;"></div>
          ${[1,2,3,4,5].map(num => `
            <button type="button" class="circle ${savedValue === num ? 'active' : ''}" data-value="${num}" aria-label="${num} 선택">
              <span>${num}</span>
            </button>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');

  prevBtn.disabled = currentPage === 0;
  if (currentPage === TOTAL_PAGES - 1) {
    nextBtn.classList.add('hidden');
    submitBtn.classList.remove('hidden');
  } else {
    nextBtn.classList.remove('hidden');
    submitBtn.classList.add('hidden');
  }
}

function pageAnsweredCount() {
  const start = currentPage * QUESTIONS_PER_PAGE;
  const end = start + QUESTIONS_PER_PAGE;
  const pageQuestions = shuffledQuestions.slice(start, end);
  let count = 0;
  pageQuestions.forEach((q) => {
    if (answers[q.no]) count++;
  });
  return count;
}

function calculateTypeScores() {
  const scores = {};
  Object.keys(typeProfiles).forEach((type) => {
    scores[type] = 0;
  });

  shuffledQuestions.forEach((q) => {
    const answer = answers[q.no];
    if (!answer) return;
    const baseScore = choiceValueToScore(answer);
    Object.entries(q.effects).forEach(([typeName, weight]) => {
      scores[typeName] += baseScore * weight;
    });
  });

  return scores;
}

function getResultType() {
  const scores = calculateTypeScores();
  return Object.keys(scores).sort((a, b) => scores[b] - scores[a])[0];
}

function getStarDataByStats(profile) {
  const avg = Math.round((profile.drive + profile.strategy + profile.team) / 3);
  if (avg >= 85) return { stars: 3, theme: 'red', redStars: true };
  if (avg >= 78) return { stars: 3, theme: 'orange', redStars: false };
  if (avg >= 70) return { stars: 2, theme: 'orange', redStars: false };
  return { stars: 1, theme: 'orange', redStars: false };
}

function animateLevelUp(targetLevel) {
  const el = document.getElementById('resultLevel');
  const startLevel = 15;
  const endLevel = Number(targetLevel);

  if (!el || Number.isNaN(endLevel)) return;

  if (endLevel <= startLevel) {
    el.textContent = endLevel;
    return;
  }

  const duration = 900;
  const startTime = performance.now();

  function tick(now) {
    const progress = Math.min((now - startTime) / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    const current = Math.round(startLevel + (endLevel - startLevel) * eased);
    el.textContent = current;

    if (progress < 1) {
      requestAnimationFrame(tick);
    } else {
      el.textContent = endLevel;
    }
  }

  el.textContent = startLevel;
  requestAnimationFrame(tick);
}

function animateStatBars(drive, strategy, team) {
  const hostFill = document.getElementById('hostFill');
  const participantFill = document.getElementById('participantFill');
  const chatFill = document.getElementById('chatFill');

  [hostFill, participantFill, chatFill].forEach(el => {
    el.style.transition = 'none';
    el.style.width = '0%';
    void el.offsetWidth;
  });

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      hostFill.style.transition = 'width 1s cubic-bezier(.22,.61,.36,1)';
      participantFill.style.transition = 'width 1s cubic-bezier(.22,.61,.36,1)';
      chatFill.style.transition = 'width 1s cubic-bezier(.22,.61,.36,1)';

      hostFill.style.width = `${drive}%`;
      participantFill.style.width = `${strategy}%`;
      chatFill.style.width = `${team}%`;
    });
  });
}

function setScaleAnswer(qNo, value, container) {
  answers[qNo] = value;
  container.dataset.value = String(value);

  const fill = container.querySelector('.scale-track-fill');
  if (fill) {
    fill.style.width = `${getTrackFillPercent(value)}%`;
  }

  container.querySelectorAll('.circle').forEach(circle => {
    circle.classList.toggle('active', Number(circle.dataset.value) === value);
  });
}

function getValueFromPointer(container, clientX) {
  const rect = container.getBoundingClientRect();
  const x = Math.max(0, Math.min(clientX - rect.left, rect.width));
  const ratio = x / rect.width;
  if (ratio < 0.2) return 1;
  if (ratio < 0.4) return 2;
  if (ratio < 0.6) return 3;
  if (ratio < 0.8) return 4;
  return 5;
}

questionArea.addEventListener('click', (e) => {
  const circle = e.target.closest('.circle');
  if (!circle) return;
  const container = circle.closest('.scale-circle');
  const qNo = Number(container.dataset.q);
  const value = Number(circle.dataset.value);
  setScaleAnswer(qNo, value, container);
});

questionArea.addEventListener('pointerdown', (e) => {
  const container = e.target.closest('.scale-circle');
  if (!container) return;
  draggingScale = container;
  const qNo = Number(container.dataset.q);
  const value = getValueFromPointer(container, e.clientX);
  setScaleAnswer(qNo, value, container);
  container.setPointerCapture?.(e.pointerId);
});

questionArea.addEventListener('pointermove', (e) => {
  if (!draggingScale) return;
  const value = getValueFromPointer(draggingScale, e.clientX);
  const qNo = Number(draggingScale.dataset.q);
  setScaleAnswer(qNo, value, draggingScale);
});

window.addEventListener('pointerup', () => {
  draggingScale = null;
});

document.getElementById('startBtn').addEventListener('click', () => {
  if (!validateTrainerLevel()) return;
  if (!validateNickname()) return;

  shuffledQuestions = [...questionBank];
  answers = {};
  currentPage = 0;

  showQuiz();
  renderCurrentPage();
  window.scrollTo({ top:0, behavior:'smooth' });
});

prevBtn.addEventListener('click', () => {
  if (currentPage > 0) {
    currentPage--;
    renderCurrentPage();
    window.scrollTo({ top:0, behavior:'smooth' });
  }
});

nextBtn.addEventListener('click', () => {
  if (pageAnsweredCount() < QUESTIONS_PER_PAGE) {
    alert('현재 페이지의 4문항을 모두 선택해 주세요.');
    return;
  }
  if (currentPage < TOTAL_PAGES - 1) {
    currentPage++;
    renderCurrentPage();
    window.scrollTo({ top:0, behavior:'smooth' });
  }
});

quizForm.addEventListener('submit', (e) => {
  e.preventDefault();

  if (Object.keys(answers).length < questionBank.length) {
    alert('모든 문항에 답변해 주세요.');
    return;
  }

  const resultType = getResultType();
  const profile = typeProfiles[resultType];
  const bestType = profile.best || '노말';
  const worstType = profile.worst;
  const starData = getStarDataByStats(profile);
  const randomHp = getRandomHp();
  const shareImageUrl = getShareImageUrl(profile);
  const pogoPath = getRandomPogoByType(resultType);

  currentRendered = {
    profileResult: profile,
    resultType,
    shareImageUrl,
    pogoPath,
    starData,
    randomHp
  };

  showResult();
  window.scrollTo({ top:0, behavior:'smooth' });

  analyzingOverlay.classList.remove('hidden');

  document.getElementById('resultLevel').textContent = '15';
  document.getElementById('hostFill').style.width = '0%';
  document.getElementById('participantFill').style.width = '0%';
  document.getElementById('chatFill').style.width = '0%';

  const badgeStars = document.querySelectorAll('.badge-star');
  badgeStars.forEach(star => {
    star.classList.remove('show', 'red-star', 'outline');
  });

  setTimeout(() => {
    document.getElementById('resultNickname').textContent = nickname.value;
    document.getElementById('resultHpText').textContent = `${randomHp} / ${randomHp} HP`;

    document.getElementById('resultMainCopy').textContent = profile.mainCopy;
    document.getElementById('resultPlayStyle').textContent = profile.playStyle;

    document.getElementById('resultPogo').src = pogoPath;
    document.getElementById('resultIcon').src = getTypeIconPath(resultType);
    document.getElementById('resultDefenseIcon').src = getTypeIconPath(worstType);
    document.getElementById('resultAttackIcon').src = getTypeIconPath(bestType);
    document.getElementById('resultCharacter').src = './images/advisor-1.png';

    document.getElementById('speechText').textContent = profile.story;

    document.getElementById('hostBar').className = `stat-bar ${starData.theme}`;
    document.getElementById('participantBar').className = `stat-bar ${starData.theme}`;
    document.getElementById('chatBar').className = `stat-bar ${starData.theme}`;

    analyzingOverlay.classList.add('hidden');

    setTimeout(() => {
      animateStatBars(profile.drive, profile.strategy, profile.team);
    }, 120);

    setTimeout(() => {
      if (starData.stars === 0) {
        badgeStars.forEach(star => {
          star.classList.add('outline');
        });
      } else {
        for (let i = 0; i < badgeStars.length; i++) {
          if (i < starData.stars) {
            setTimeout(() => {
              badgeStars[i].classList.add('show');
              if (starData.redStars) {
                badgeStars[i].classList.add('red-star');
              }
            }, i * 180);
          } else {
            badgeStars[i].classList.add('outline');
          }
        }
      }
    }, 260);

    setTimeout(() => {
      animateLevelUp(trainerLevel.value);
    }, 500);

  }, 2400);
});

document.getElementById('retryBtn').addEventListener('click', () => {
  answers = {};
  currentPage = 0;
  trainerLevel.value = '';
  nickname.value = '';
  document.getElementById('resultLevel').textContent = '15';
  analyzingOverlay.classList.add('hidden');
  showIntro();
  window.scrollTo({ top:0, behavior:'smooth' });
});

async function makeShareImageDataUrl() {
  const target = document.getElementById('captureTarget');
  target.classList.add('capture-fix');

  try {
    const images = Array.from(target.querySelectorAll('img'));
    await Promise.all(
      images.map(img => {
        if (img.complete) return Promise.resolve();
        return new Promise(resolve => {
          img.onload = resolve;
          img.onerror = resolve;
        });
      })
    );

    await new Promise(resolve =>
      requestAnimationFrame(() => requestAnimationFrame(resolve))
    );

    const rect = target.getBoundingClientRect();

    const canvas = await html2canvas(target, {
      useCORS: true,
      backgroundColor: null,
      scale: 2,
      width: Math.round(rect.width),
      height: Math.round(rect.height),
      windowWidth: document.documentElement.clientWidth,
      windowHeight: document.documentElement.clientHeight
    });

    return canvas.toDataURL('image/png');
  } finally {
    target.classList.remove('capture-fix');
  }
}

document.getElementById('downloadBtn').addEventListener('click', async () => {
  try {
    const dataUrl = await makeShareImageDataUrl();
    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = `trainer-result-${Date.now()}.png`;
    a.click();
  } catch (error) {
    console.error(error);
    alert('이미지 저장 중 오류가 발생했습니다.');
  }
});

document.getElementById('shareBtn').addEventListener('click', () => {
  if (!currentRendered) return;

  const profile = currentRendered.profileResult;
  const shareImageUrl = currentRendered.shareImageUrl;

  if (!window.Kakao) {
    alert('카카오 SDK가 로드되지 않았습니다.');
    return;
  }

  if (!window.Kakao.isInitialized()) {
    alert('카카오 JavaScript 키 또는 도메인 설정을 확인해주세요.');
    return;
  }

  window.Kakao.Share.sendCustom({
    templateId: 1409816,
    templateArgs: {
      TYPE: profile.type,
      MAINCOPY: profile.mainCopy,
      PLAYSTYLE: profile.playStyle,
      DESC: profile.story.replace(/\n/g, ' '),
      THU: shareImageUrl
    }
  });
});
</script>
