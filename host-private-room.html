<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비밀방 생성 | Pokémon GO Global</title>
<style>
body{margin:0;font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo',sans-serif;background:#f5f6f8;color:#222;text-align:center}
.wrap{max-width:640px;margin:0 auto;padding:40px 20px 60px}
.breadcrumb{display:inline-block;margin-bottom:18px;color:#666;font-size:14px;text-decoration:none}
.kicker{display:inline-block;padding:8px 14px;border-radius:999px;background:#edf4ff;color:#3f6fff;font-size:12px;font-weight:700;margin-bottom:14px}
.title{font-size:30px;font-weight:900;margin-bottom:10px;line-height:1.2}
.lead{font-size:15px;color:#666;line-height:1.7;margin:0 auto 28px;max-width:560px}
.slider{position:relative;overflow:hidden}
.track{display:flex;transition:transform .35s ease}
.slide{min-width:100%}
.slide img{width:100%;border-radius:28px;box-shadow:0 20px 40px rgba(0,0,0,0.10);background:#fff}
.nav{position:absolute;top:50%;width:100%;display:flex;justify-content:space-between;transform:translateY(-50%);pointer-events:none}
.nav button{width:46px;height:46px;border-radius:50%;border:none;background:#fff;box-shadow:0 5px 15px rgba(0,0,0,0.10);cursor:pointer;font-size:20px;pointer-events:auto}
.dots{margin:18px 0 22px}
.dots span{width:10px;height:10px;margin:0 4px;display:inline-block;border-radius:50%;background:#ddd;transition:.2s}
.dots .active{background:#222;width:24px;border-radius:999px}
.desc{background:#fff;border-radius:22px;box-shadow:0 8px 20px rgba(0,0,0,0.05);padding:22px 18px}
.desc h2{font-size:22px;margin:0 0 10px;line-height:1.3}
.desc p{color:#666;line-height:1.7;margin:0}
.bottom{margin-top:28px}
.row{display:flex;gap:10px}
.row a{flex:1;padding:15px 14px;border-radius:14px;background:#fff;text-decoration:none;color:#000;font-weight:600;box-shadow:0 5px 15px rgba(0,0,0,0.05);line-height:1.45}
.main{margin-top:10px;display:block;padding:16px;border-radius:14px;background:#4a7aff;color:#fff;text-decoration:none;font-weight:700;box-shadow:0 10px 24px rgba(74,122,255,.25)}
@media(min-width:900px){.wrap{max-width:720px}}
</style>
</head>
<body>
<div class="wrap">
  <a href="index.html" class="breadcrumb">← 메인으로 돌아가기</a>
  <div class="kicker">주최자 가이드</div>
  <div class="title">비밀방 생성</div>
  <p class="lead">리모트 인원 제한과 참여 누락을 방지하기 위해 비밀방 사용을 권장합니다.</p>

  <div class="slider" id="slider">
    <div class="track" id="track">
      <div class="slide"><img src="images/host-private-room-01.jpg" alt="1. 그룹 기능 확인"></div>
      <div class="slide"><img src="images/host-private-room-02.jpg" alt="2. 신규 그룹 만들기"></div>
      <div class="slide"><img src="images/host-private-room-03.jpg" alt="3. 비밀방 사용 이유"></div>
    </div>
    <div class="nav">
      <button onclick="prev()">‹</button>
      <button onclick="next()">›</button>
    </div>
  </div>

  <div class="dots">
    <span class="active"></span>
    <span></span>
    <span></span>
  </div>

  <div class="desc">
    <h2 id="title">1. 그룹 기능 확인</h2>
    <p id="text">레이드 입장 후 그룹 관련 화면으로 이동해 주세요.</p>
  </div>

  <div class="bottom">
    <div class="row">
      <a href="host-mention.html">이전 가이드 : 멘션콜 방법</a>
      <a href="host-invite-more.html">다음 가이드 : 추가 초대 방법</a>
    </div>
    <a href="index.html" class="main">메인으로 돌아가기</a>
  </div>
</div>

<script>

let index = 0;
const track = document.getElementById("track");
const dots = document.querySelectorAll(".dots span");
const titles = ["1. 그룹 기능 확인", "2. 신규 그룹 만들기", "3. 비밀방 사용 이유"];
const texts = ["레이드 입장 후 그룹 관련 화면으로 이동해 주세요.", "그룹 코드 입력 화면에서 신규 그룹 만들기를 선택해 비밀방을 생성합니다.", "현장 인원이나 따라오는 인원이 겹치면 리모트 10명 제한에 닿을 수 있어, 참여자 배제를 막기 위해 비밀방 사용을 권장합니다."];
const total = titles.length;

function update(){
  track.style.transform = `translateX(-${index * 100}%)`;
  dots.forEach(d=>d.classList.remove("active"));
  dots[index].classList.add("active");
  document.getElementById("title").innerText = titles[index];
  document.getElementById("text").innerText = texts[index];
}
function next(){ index = (index + 1) % total; update(); }
function prev(){ index = (index - 1 + total) % total; update(); }

let startX = 0;
let isDown = false;
const slider = document.getElementById("slider");
slider.addEventListener("touchstart", e => { startX = e.touches[0].clientX; }, {passive:true});
slider.addEventListener("touchend", e => {
  const endX = e.changedTouches[0].clientX;
  if(startX - endX > 50) next();
  else if(endX - startX > 50) prev();
}, {passive:true});
slider.addEventListener("mousedown", e => { isDown = true; startX = e.clientX; });
document.addEventListener("mouseup", e => {
  if(!isDown) return;
  isDown = false;
  const endX = e.clientX;
  if(startX - endX > 50) next();
  else if(endX - startX > 50) prev();
});

</script>
</body>
</html>
