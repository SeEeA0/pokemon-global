<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>신입 가이드 | Pokémon GO Global 🌏</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0}

:root{
  --bg1:#fafbfc;
  --bg2:#f3f5f8;
  --bg3:#edf1f6;

  --text1:#1d1d1f;
  --text2:#70757f;
  --muted:#8f94a0;

  --cta1:#7d71ff;
  --cta2:#5a4de0;
  --cta3:#283c94;

  --shadow-soft:0 12px 26px rgba(25,31,52,.06);
  --shadow-card:0 20px 40px rgba(25,31,52,.10);
  --shadow-cta:0 18px 32px rgba(80,78,177,.28);
}

body{
  font-family:'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
  background:radial-gradient(circle at top, var(--bg1) 0%, var(--bg2) 40%, var(--bg3) 100%);
  color:var(--text1);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

.wrap{
  width:100%;
  max-width:980px;
  margin:0 auto;
  padding:28px 16px 56px;
}

.header-logo{
  text-align:center;
  font-size:14px;
  font-weight:700;
  color:var(--muted);
  letter-spacing:.08em;
  margin-bottom:20px;
}

.hero{
  max-width:760px;
  margin:0 auto 26px;
  text-align:center;
}

.hero h1{
  margin:0 0 10px;
  font-size:clamp(28px, 4vw, 40px);
  line-height:1.18;
  font-weight:900;
  letter-spacing:-0.04em;
}

.hero p{
  margin:0 auto;
  max-width:720px;
  font-size:clamp(15px, 2vw, 18px);
  line-height:1.8;
  color:var(--text2);
  word-break:keep-all;
}

.section{
  max-width:860px;
  margin:0 auto;
}

.section-title{
  margin:0 0 14px;
  font-size:18px;
  font-weight:800;
  color:#252831;
  letter-spacing:-0.02em;
}

.cards{
  display:grid;
  grid-template-columns:1fr;
  gap:14px;
}

.card{
  position:relative;
  overflow:hidden;
  display:block;
  padding:22px 22px;
  border-radius:24px;
  background:rgba(255,255,255,.76);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  text-decoration:none;
  color:var(--text1);
  box-shadow:
    var(--shadow-soft),
    inset 0 1px 0 rgba(255,255,255,.98);
  border:1px solid rgba(255,255,255,.8);
  transition:transform .22s ease, box-shadow .24s ease, background .24s ease;
}

.card::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(115deg, transparent 0%, rgba(255,255,255,.30) 46%, transparent 70%);
  transform:translateX(-120%);
  transition:transform .72s ease;
  pointer-events:none;
}

.card:hover{
  transform:translateY(-2px);
  background:rgba(255,255,255,.86);
  box-shadow:
    0 16px 32px rgba(25,31,52,.10),
    inset 0 1px 0 rgba(255,255,255,.98);
}
.card:hover::before{
  transform:translateX(120%);
}

.card-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
}

.card h2{
  margin:0;
  font-size:22px;
  font-weight:800;
  letter-spacing:-0.03em;
}

.card-arrow{
  flex:0 0 auto;
  width:42px;
  height:42px;
  border-radius:999px;
  background:rgba(255,255,255,.72);
  box-shadow:0 8px 18px rgba(20,24,42,.06);
  position:relative;
}
.card-arrow::after{
  content:"";
  position:absolute;
  top:50%;
  left:50%;
  width:10px;
  height:10px;
  border-top:2.5px solid rgba(39,44,58,.7);
  border-right:2.5px solid rgba(39,44,58,.7);
  transform:translate(-65%,-50%) rotate(45deg);
}

.card p{
  margin:10px 0 0;
  color:var(--text2);
  font-size:15px;
  line-height:1.75;
  word-break:keep-all;
}

.bottom{
  max-width:860px;
  margin:18px auto 0;
}

.main-btn{
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:70px;
  padding:18px 22px;
  border-radius:24px;
  background:linear-gradient(135deg, var(--cta1) 0%, var(--cta2) 46%, var(--cta3) 100%);
  color:#fff;
  text-decoration:none;
  font-weight:800;
  font-size:19px;
  letter-spacing:-0.02em;
  box-shadow:
    var(--shadow-cta),
    inset 0 1px 0 rgba(255,255,255,.18);
  transition:transform .22s ease, box-shadow .24s ease;
}
.main-btn::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(115deg, transparent 0%, rgba(255,255,255,.24) 46%, transparent 70%);
  transform:translateX(-120%);
  transition:transform .72s ease;
}
.main-btn:hover{
  transform:translateY(-1px);
  box-shadow:
    0 22px 38px rgba(76,74,173,.34),
    inset 0 1px 0 rgba(255,255,255,.22);
}
.main-btn:hover::before{
  transform:translateX(120%);
}

@media (max-width:640px){
  .wrap{padding:22px 12px 44px}
  .header-logo{margin-bottom:18px;font-size:13px}
  .card{border-radius:20px;padding:18px 18px}
  .card h2{font-size:20px}
  .card p{font-size:14px}
  .card-arrow{width:38px;height:38px}
  .main-btn{min-height:62px;font-size:17px;border-radius:18px}
}
  /* ===== Page Transition ===== */
html.is-transitioning,
html.is-transitioning body{
  overflow:hidden;
}

.page-transition-layer{
  position:fixed;
  inset:0;
  z-index:9999;
  pointer-events:none;
  background:linear-gradient(180deg,#f7f9fc 0%, #eef2f7 100%);
  opacity:0;
  transform:translateX(100%);
  transition:
    transform .52s cubic-bezier(.22,.61,.36,1),
    opacity .32s ease;
}

html.is-transitioning .page-transition-layer{
  opacity:1;
  transform:translateX(0);
}

.page-shell{
  min-height:100vh;
  opacity:0;
  transform:translateX(18px);
}

body.is-ready .page-shell{
  animation:pageEnter .55s cubic-bezier(.22,.61,.36,1) forwards;
}

body.is-leaving .page-shell{
  animation:pageLeave .38s cubic-bezier(.55,.08,.68,.53) forwards;
}

@keyframes pageEnter{
  from{
    opacity:0;
    transform:translateX(22px);
  }
  to{
    opacity:1;
    transform:translateX(0);
  }
}

@keyframes pageLeave{
  from{
    opacity:1;
    transform:translateX(0);
  }
  to{
    opacity:.88;
    transform:translateX(-16px);
  }
}

/* ===== stagger items ===== */
.fade-item{
  opacity:0;
  transform:translateY(16px);
}

body.is-ready .fade-item{
  animation:fadeUpItem .55s var(--ease) forwards;
}

body.is-ready .fade-item:nth-child(1){ animation-delay:.10s; }
body.is-ready .fade-item:nth-child(2){ animation-delay:.16s; }
body.is-ready .fade-item:nth-child(3){ animation-delay:.22s; }
body.is-ready .fade-item:nth-child(4){ animation-delay:.28s; }
body.is-ready .fade-item:nth-child(5){ animation-delay:.34s; }
body.is-ready .fade-item:nth-child(6){ animation-delay:.40s; }
body.is-ready .fade-item:nth-child(7){ animation-delay:.46s; }
body.is-ready .fade-item:nth-child(8){ animation-delay:.52s; }

@keyframes fadeUpItem{
  from{
    opacity:0;
    transform:translateY(16px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* mobile tuning */
@media (max-width:640px){
  .page-transition-layer{
    transition:
      transform .42s cubic-bezier(.22,.61,.36,1),
      opacity .26s ease;
  }

  .page-shell{
    transform:translateX(12px);
  }

  @keyframes pageEnter{
    from{
      opacity:0;
      transform:translateX(14px);
    }
    to{
      opacity:1;
      transform:translateX(0);
    }
  }

  @keyframes pageLeave{
    from{
      opacity:1;
      transform:translateX(0);
    }
    to{
      opacity:.92;
      transform:translateX(-10px);
    }
  }
}

/* reduced motion */
@media (prefers-reduced-motion: reduce){
  .page-transition-layer,
  .page-shell,
  .fade-item{
    animation:none !important;
    transition:none !important;
    transform:none !important;
    opacity:1 !important;
  }
}
</style>
</head>
<body>
<div class="page-transition-layer" id="pageTransition"></div>

<div class="page-shell">
  <div class="wrap">
  <div class="header-logo">PGO Global🌏오픈톡 가이드</div>

  <div class="hero">
    <h1>신입 이용수칙</h1>
    <p>처음 오신 분들이 꼭 먼저 확인해야 하는 기본 흐름을 순서대로 정리했습니다.</p>
  </div>

  <div class="section">
    <h2 class="section-title">가이드 목록</h2>

    <div class="cards">
      <a href="newcomer-nickname.html" class="card">
        <div class="card-top">
          <h2>닉네임 설정</h2>
          <span class="card-arrow" aria-hidden="true"></span>
        </div>
        <p>오픈채팅방에서 사용할 닉네임 형식과 작성 기준을 안내합니다.</p>
      </a>

      <a href="newcomer-chat.html" class="card">
        <div class="card-top">
          <h2>채팅 규칙</h2>
          <span class="card-arrow" aria-hidden="true"></span>
        </div>
        <p>채팅방에서 지켜야 할 기본 예절과 금지되는 표현을 확인할 수 있습니다.</p>
      </a>
    </div>
  </div>

  <div class="bottom">
    <a href="index.html" class="main-btn">메인으로 돌아가기</a>
  </div>
</div>
</body>
</html>
