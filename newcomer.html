<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>신입 가이드 | Pokémon GO Global 🌏 가이드북</title>

  <style>
    body{
      margin:0;
      font-family:'Pretendard', sans-serif;
      background:#f5f6f8;
      color:#222;
    }

    .wrap{
      max-width:520px;
      margin:0 auto;
      padding:28px 20px 60px;
    }

    .top-link{
      display:inline-block;
      margin-bottom:18px;
      color:#666;
      font-size:14px;
      text-decoration:none;
    }

    .title{
      font-size:28px;
      font-weight:900;
      margin-bottom:10px;
    }

    .desc{
      color:#666;
      font-size:15px;
      line-height:1.6;
      margin-bottom:28px;
    }

    .card{
      display:block;
      padding:20px;
      margin-bottom:14px;
      border-radius:18px;
      background:#fff;
      text-decoration:none;
      color:#000;
      box-shadow:0 10px 25px rgba(0,0,0,0.05);
      transition:0.2s;
    }

    .card:hover{
      transform:translateY(-3px);
    }

    .card h2{
      margin:0;
      font-size:20px;
      font-weight:800;
    }

    .card p{
      margin:8px 0 0;
      color:#666;
      font-size:14px;
      line-height:1.5;
    }

    .bottom{
      margin-top:28px;
    }

    .main-btn{
      display:block;
      text-align:center;
      padding:16px;
      border-radius:14px;
      background:#4a7aff;
      color:#fff;
      text-decoration:none;
      font-weight:700;
    }

    @media(min-width:900px){
      .wrap{
        max-width:600px;
      }
    }
  </style>
</head>
<body>

  <div class="wrap">

    <a href="index.html" class="top-link">← 메인으로 돌아가기</a>

    <div class="title">신입 가이드</div>
    <div class="desc">
      처음 오신 분들이 가장 먼저 확인해야 하는 가이드입니다.  
      닉네임 설정과 채팅 규칙부터 먼저 확인해주세요.
    </div>

    <a href="newcomer-nickname.html" class="card">
      <h2>닉네임 설정</h2>
      <p>
        톡방 닉네임 / 포켓몬고 아이디 / 레벨 형식으로
        닉네임을 설정하는 방법입니다.
      </p>
    </a>

    <a href="newcomer-chat.html" class="card">
      <h2>채팅 규칙</h2>
      <p>
        음슴체, 반말, 단타 채팅 등
        기본적으로 지켜야 할 채팅 예절 안내입니다.
      </p>
    </a>

    <div class="bottom">
      <a href="index.html" class="main-btn">메인으로 돌아가기</a>
    </div>

  </div>

</body>
</html>
